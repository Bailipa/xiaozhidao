<script>
function showConfirm(o) {
  var m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:flex;align-items:center;justify-content:center;padding:0 32px;';
  m.innerHTML = '<div style="background:#fff;border-radius:14px;width:100%;overflow:hidden;">'
    + '<div style="padding:24px 20px;text-align:center;">'
    + '<iconify-icon style="font-size:32px;color:' + (o.danger?'#DC2626':'#1E5AE6') + ';" icon="' + (o.danger?'solar:trash-bin-trash-bold':'solar:shield-warning-bold') + '"></iconify-icon>'
    + '<div style="font-size:16px;font-weight:700;color:#191919;margin-top:10px;">' + o.title + '</div>'
    + '<div style="font-size:12px;color:#888;margin-top:6px;line-height:1.6;">' + o.desc + '</div>'
    + '</div>'
    + '<div style="display:flex;border-top:1px solid #F0F0F0;">'
    + '<button data-cancel style="flex:1;height:48px;background:#fff;color:#888;font-size:15px;border:none;border-right:1px solid #F0F0F0;cursor:pointer;">取消</button>'
    + '<button data-ok style="flex:1;height:48px;background:#fff;color:' + (o.danger?'#DC2626':'#1E5AE6') + ';font-size:15px;font-weight:600;border:none;cursor:pointer;">确认</button>'
    + '</div></div>';
  document.body.appendChild(m);
  m.querySelector('[data-cancel]').onclick = function() { m.remove(); };
  m.querySelector('[data-ok]').onclick = function() { m.remove(); o.onConfirm && o.onConfirm(); };
}
function toast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;left:50%;bottom:120px;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:999;';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 1800);
}
function delReminder(name) {
  showConfirm({
    title: '确认删除这条提醒?',
    desc: '提醒「' + name + '」删除后将无法恢复,此操作将记入审计日志。',
    danger: true,
    onConfirm: function() { toast('已删除'); }
  });
}
function resend(name, target) {
  showConfirm({
    title: '确认再次发送提醒?',
    desc: '将向「' + target + '」重新发送提醒「' + name + '」。',
    onConfirm: function() { toast('已重新发送'); }
  });
}
</script>
<script>
/* PR-H.3 v3: nav-back 智能返回 — 优先 referrer, 其次当前 URL */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    /* referrer: 如果 referrer 是同源 counselor_*.html, 用它作为回退目标 */
    var refBase = null, refParts = [];
    if (document.referrer) {
      try {
        var refUrl = new URL(document.referrer);
        var refName = refUrl.pathname.substring(refUrl.pathname.lastIndexOf('/') + 1);
        if (refName.indexOf('counselor_') === 0 && refName.indexOf('.html') !== -1) {
          refBase = refName;
          var refSp = new URLSearchParams(refUrl.search);
          K.forEach(function(k){var v=refSp.get(k); if(v!=null && v!=='') refParts.push(k+'='+encodeURIComponent(v));});
        }
      } catch(e) {}
    }
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back, .nav-bar a[href^="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      var useParts = parts.length ? parts : refParts;
      if (!useParts.length) return;
      /* 如果 referrer 可用, 用 referrer 作为基础; 否则保留原 base */
      var finalBase = refBase || base;
      a.setAttribute('href', finalBase + '?' + useParts.join('&'));
    });
  } catch(e) { console.error('PR-H.3 v3 nav-back error:', e); }
})();
</script>
<script>
/* PR-H.3 v3+: forward 链 (子页链接携带父级参数) */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    if (!parts.length) return;
    var joinTo = function(baseHref){
      var qIdx = baseHref.indexOf('?');
      return qIdx === -1 ? baseHref + '?' + parts.join('&') : baseHref + '&' + parts.join('&');
    };
    document.querySelectorAll('a[href*="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('nav-back') || a.classList.contains('p-2')) return;
      var m = h.match(/^(counselor_[^?#]+)/);
      if (!m) return;
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      a.setAttribute('href', joinTo(h));
    });
  } catch(e) { console.error('PR-H.3 forward error:', e); }
})();
</script>
