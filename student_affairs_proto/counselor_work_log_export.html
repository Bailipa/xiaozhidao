<!DOCTYPE html>
<!--
  API Contract:
  POST /api/work-logs/export
  Request: {
    "range": { "from":"YYYY-MM-DD", "to":"YYYY-MM-DD" },
    "categories": ["c1","c2","c3","c4","c5"],
    "format": "xlsx|docx|pdf"
  }
  Response 200: { "download_url":"string", "expire_at":"ISO-8601", "row_count": int }
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>导出工作日志 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --success:#07C160; --warning:#FA9D3B; --danger:#DC2626; --bg-page:#F7F7F7; --divider:#F0F0F0; --text-primary:#191919; --text-regular:#444; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; box-shadow:0 0 50px rgba(0,0,0,0.5); border:8px solid #333; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding-bottom:120px; }
.section { background:#fff; margin:14px 16px 0; border-radius:12px; padding:14px 16px; }
.section .h { font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:10px; }
.section .h .meta { font-size:11px; color:var(--text-secondary); font-weight:400; margin-left:6px; }

.range-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.range-row .field { background:#F5F6F8; border-radius:8px; padding:10px 12px; }
.range-row .field .label { font-size:10px; color:var(--text-secondary); }
.range-row .field .value { font-size:14px; color:var(--text-primary); font-weight:600; margin-top:2px; }

.cat-list { display:flex; flex-wrap:wrap; gap:8px; }
.cat-list label { display:flex; align-items:center; gap:4px; padding:6px 12px; border:1px solid var(--divider); border-radius:18px; font-size:12px; color:var(--text-regular); cursor:pointer; background:#fff; }
.cat-list label.on { background:rgba(30,90,230,0.08); border-color:var(--color-primary); color:var(--color-primary); font-weight:600; }
.cat-list input { display:none; }
.cat-list .swatch { width:8px; height:8px; border-radius:50%; }

.format-list { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.format-list label { display:flex; flex-direction:column; align-items:center; padding:14px 8px; border:1.5px solid var(--divider); border-radius:10px; cursor:pointer; background:#fff; }
.format-list label.on { border-color:var(--color-primary); background:rgba(30,90,230,0.04); }
.format-list input { display:none; }
.format-list .ic { font-size:24px; color:var(--color-primary); margin-bottom:6px; }
.format-list .name { font-size:12px; color:var(--text-primary); font-weight:600; }
.format-list .ext { font-size:10px; color:var(--text-secondary); margin-top:2px; }

.preview { background:rgba(30,90,230,0.05); border:1px dashed rgba(30,90,230,0.3); border-radius:10px; padding:12px 14px; margin-top:14px; font-size:12px; color:var(--text-regular); line-height:1.7; }
.preview .row { display:flex; justify-content:space-between; padding:3px 0; }
.preview .k { color:var(--text-secondary); }
.preview .v { color:var(--text-primary); font-weight:600; }

.tip-card { margin:16px; padding:12px; background:#FEF3C7; border-radius:10px; font-size:11px; color:#92400E; line-height:1.6; display:flex; gap:8px; }
.tip-card iconify-icon { color:var(--warning); flex-shrink:0; font-size:16px; }

.action-bar { position:absolute; left:0; right:0; bottom:0; background:#fff; padding:12px 16px 28px; border-top:1px solid var(--divider); }
.btn { width:100%; height:48px; border-radius:24px; font-size:15px; font-weight:600; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; gap:6px; }
.btn.primary { background:var(--color-primary); color:#fff; box-shadow:0 4px 12px rgba(30,90,230,0.3); }
.btn.primary:disabled { background:#C0C4CC; box-shadow:none; }

.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
<body>
<div class="phone-shell">
<div class="status-bar">
<span>12:20</span>
<div class="flex gap-1.5">
<iconify-icon icon="mingcute:signal-fill"></iconify-icon>
<iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
<iconify-icon icon="mingcute:battery-fill"></iconify-icon>
</div>
</div>
<div class="nav-bar">
<a class="p-2 -ml-2" href="counselor_workbench.html"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
<h1 class="flex-1 text-center text-base font-bold text-gray-900">导出工作日志</h1>
<span class="p-2 -mr-2 w-8"></span>
</div>

<div class="content">
<div class="section">
<div class="h">时间范围</div>
<div class="range-row">
<div class="field"><div class="label">开始</div><div class="value">2026-06-01</div></div>
<div class="field"><div class="label">结束</div><div class="value">2026-06-30</div></div>
</div>
</div>

<div class="section">
<div class="h">日志分类 <span class="meta">多选</span></div>
<div class="cat-list">
<label class="on" data-code="c1"><input type="checkbox" checked/><span class="swatch" style="background:#1E5AE6;"></span>谈心谈话</label>
<label class="on" data-code="c2"><input type="checkbox" checked/><span class="swatch" style="background:#F59E0B;"></span>进宿舍</label>
<label class="on" data-code="c3"><input type="checkbox" checked/><span class="swatch" style="background:#07C160;"></span>进课堂</label>
<label class="on" data-code="c4"><input type="checkbox" checked/><span class="swatch" style="background:#16A34A;"></span>组织班会</label>
<label class="on" data-code="c5"><input type="checkbox" checked/><span class="swatch" style="background:#DC2626;"></span>班干会议</label>
</div>
</div>

<div class="section">
<div class="h">导出格式</div>
<div class="format-list">
<label class="on" data-fmt="xlsx"><input type="radio" name="fmt" checked/><iconify-icon class="ic" icon="vscode-icons:file-type-excel"></iconify-icon><span class="name">Excel</span><span class="ext">.xlsx</span></label>
<label data-fmt="docx"><input type="radio" name="fmt"/><iconify-icon class="ic" icon="vscode-icons:file-type-word"></iconify-icon><span class="name">Word</span><span class="ext">.docx</span></label>
<label data-fmt="pdf"><input type="radio" name="fmt"/><iconify-icon class="ic" icon="vscode-icons:file-type-pdf2"></iconify-icon><span class="name">PDF</span><span class="ext">.pdf</span></label>
</div>
</div>

<div class="preview">
<div class="row"><span class="k">预计导出行数</span><span class="v">42 条</span></div>
<div class="row"><span class="k">预计文件大小</span><span class="v">~ 380 KB</span></div>
<div class="row"><span class="k">包含字段</span><span class="v">标题 / 时间 / 地点 / 关联班级 / 内容 / 图片</span></div>
</div>

<div class="tip-card">
<iconify-icon icon="solar:shield-check-linear"></iconify-icon>
<div>导出文件将在 24 小时内自动失效。导出操作将记入审计日志,留存 365 天。</div>
</div>
</div>

<div class="action-bar">
<button class="btn primary" id="exportBtn" onclick="doExport()">
<iconify-icon icon="solar:download-square-bold"></iconify-icon>
立即导出
</button>
</div>
<div class="home-indicator"><div class="bar"></div></div>
</div>
<script>
document.querySelectorAll('.cat-list label').forEach(l => {
  l.addEventListener('click', e => {
    e.preventDefault();
    l.classList.toggle('on');
    l.querySelector('input').checked = l.classList.contains('on');
    refreshPreview();
  });
});
document.querySelectorAll('.format-list label').forEach(l => {
  l.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.format-list label').forEach(x => x.classList.remove('on'));
    l.classList.add('on');
    l.querySelector('input').checked = true;
    refreshPreview();
  });
});

function refreshPreview() {
  const count = document.querySelectorAll('.cat-list label.on').length;
  document.querySelectorAll('.preview .row')[0].querySelector('.v').textContent = (count * 8) + ' 条';
}

function doExport() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.innerHTML = '<iconify-icon icon="solar:hourglass-bold"></iconify-icon> 生成中…';
  setTimeout(() => {
    btn.innerHTML = '<iconify-icon icon="solar:check-circle-bold"></iconify-icon> 已提交,稍后下载';
    btn.style.background = '#07C160';
    setTimeout(() => { window.location.href = 'counselor_workbench.html?toast=exported'; }, 800);
  }, 1200);
}
</script>
</body>
</html>
