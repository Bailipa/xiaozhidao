<style>
:root { --color-primary:#1E5AE6; --color-bg-page:#F5F6F8; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--color-bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; border-bottom:1px solid #F3F4F6; flex-shrink:0; }
.content { flex:1; overflow-y:auto; }
.tab-bar { height:84px; background:#fff; border-top:1px solid #E5E7EB; display:flex; justify-content:space-around; align-items:center; padding-bottom:20px; position:relative; flex-shrink:0; }
.tab-item { display:flex; flex-direction:column; align-items:center; text-align:center; color:#9CA3AF; text-decoration:none; }
.tab-item.active { color:var(--color-primary); }
.tab-item iconify-icon { font-size:24px; margin-bottom:4px; }
.tab-item span { font-size:11px; }
.plus-tab { width:52px; height:52px; background:var(--color-primary); border-radius:16px; display:flex; align-items:center; justify-content:center; color:#fff; position:absolute; top:-16px; left:50%; transform:translateX(-50%); box-shadow:0 4px 12px rgba(37,99,235,0.4); border:2px solid #fff; }

/* 顶部一级 tab(系统日志 / 自定义记录) */
.source-tabs { display:flex; background:#fff; padding:0 16px; border-bottom:1px solid #F3F4F6; flex-shrink:0; }
.source-tab { flex:1; text-align:center; padding:14px 0; font-size:14px; color:#6B7280; position:relative; }
.source-tab.active { color:var(--color-primary); font-weight:600; }
.source-tab.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:32px; height:3px; background:var(--color-primary); border-radius:2px; }
.source-tab .count { font-size:10px; background:#F3F4F6; color:#888; padding:1px 6px; border-radius:8px; margin-left:4px; font-weight:400; }
.source-tab.active .count { background:#EFF6FF; color:var(--color-primary); }

/* 二级 chip 筛选 */
.chip-row { display:flex; gap:8px; padding:10px 16px; overflow-x:auto; flex-shrink:0; background:#fff; }
.chip-row.no-border { border-top:1px solid #F3F4F6; }
.chip { padding:4px 12px; background:#F5F5F5; color:#444; border-radius:14px; font-size:12px; white-space:nowrap; cursor:pointer; flex-shrink:0; }
.chip.on { background:#EFF6FF; color:var(--color-primary); font-weight:600; }
.chip.cat-1 { background:#EFF6FF; color:#1E5AE6; }
.chip.cat-2 { background:#FFF7E6; color:#C2700A; }
.chip.cat-3 { background:#ECFEFF; color:#0E7490; }
.chip.cat-4 { background:#ECFDF5; color:#16A34A; }
.chip.cat-5 { background:#F5F3FF; color:#7C3AED; }

.log-card { background:#fff; border-radius:12px; margin:8px 16px; padding:14px; position:relative; box-shadow:0 1px 2px rgba(0,0,0,0.02); }
.log-card .head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.log-card .left .tag-row { display:flex; align-items:center; gap:6px; }
.log-card .cat-tag { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; }
.log-card .cat-tag.c1 { background:#EFF6FF; color:#1E5AE6; }
.log-card .cat-tag.c2 { background:#FFF7E6; color:#C2700A; }
.log-card .cat-tag.c3 { background:#ECFEFF; color:#0E7490; }
.log-card .cat-tag.c4 { background:#ECFDF5; color:#16A34A; }
.log-card .cat-tag.c5 { background:#F5F3FF; color:#7C3AED; }
.log-card .time { font-size:11px; color:#9CA3AF; }
.log-card .status { font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; }
.log-card .status.submitted { background:#ECFDF5; color:#16A34A; }
.log-card .status.draft { background:#F3F4F6; color:#888; }
.log-card .title { font-size:15px; font-weight:600; color:#111827; margin:4px 0 6px; }
.log-card .body { font-size:13px; color:#6B7280; line-height:1.6; }
.log-card .foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid #F5F5F5; }
.log-card .left-meta { display:flex; align-items:center; gap:10px; font-size:11px; color:#9CA3AF; }
.log-card .left-meta .v { color:#111827; font-weight:600; }
.log-card .actions { display:flex; gap:12px; }
.log-card .actions a { font-size:12px; }
.log-card .actions .edit { color:var(--color-primary); font-weight:600; }
.log-card .actions .view { color:#9CA3AF; }
.log-card .actions .del { color:#FA5151; }
.log-card .opacity-80 { opacity:0.85; border-left:3px solid #E5E7EB; }

/* PR-H+: 创建/修改时间戳(会议要求:工作记录需同时记录创建时间与修改时间) */
.time-row { display:flex; align-items:center; gap:6px; margin-top:8px; padding-top:8px; border-top:1px dashed #F0F0F0; font-size:10px; color:#9CA3AF; flex-wrap:wrap; }
.time-row .ts { display:inline-flex; align-items:center; gap:3px; }
.time-row .ts iconify-icon { font-size:11px; }
.time-row .ts.created { color:#6B7280; }
.time-row .ts.updated { color:var(--color-primary); font-weight:600; }
.time-row .ts .label { color:#9CA3AF; font-weight:400; margin-right:2px; }

/* PR-H+: 修改历史时间线 (详情弹窗) */
.history-timeline { margin-top:14px; padding:12px 14px; background:#F9FAFB; border-radius:10px; border-left:3px solid var(--color-primary); }
.history-timeline .h-title { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:#191919; margin-bottom:10px; }
.history-timeline .h-title iconify-icon { font-size:14px; color:var(--color-primary); }
.history-timeline ul { list-style:none; margin:0; padding:0; }
.history-timeline li { position:relative; padding:0 0 10px 16px; font-size:11px; color:#444; line-height:1.5; }
.history-timeline li:last-child { padding-bottom:0; }
.history-timeline li::before { content:''; position:absolute; left:5px; top:5px; width:6px; height:6px; border-radius:50%; background:#D1D5DB; }
.history-timeline li.created::before { background:var(--color-primary); }
.history-timeline li.updated::before { background:var(--warning); }
.history-timeline li .h-ts { color:#6B7280; font-family:ui-monospace, "SF Mono", monospace; font-size:10px; }
.history-timeline li .h-action { display:inline-block; padding:0 5px; border-radius:3px; font-size:9px; font-weight:600; margin-left:4px; }
.history-timeline li.created .h-action { background:#EFF6FF; color:var(--color-primary); }
.history-timeline li.updated .h-action { background:#FFF7E6; color:#C2700A; }
.history-timeline li .h-summary { color:#191919; }

.fab { position:fixed; bottom:100px; right:30px; width:54px; height:54px; background:var(--color-primary); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(37,99,235,0.4); z-index:20; }

.empty { text-align:center; padding:60px 20px; color:#9CA3AF; font-size:13px; }
.empty .icon { font-size:48px; color:#D1D5DB; margin-bottom:12px; }
.empty .btn { display:inline-block; margin-top:16px; padding:10px 24px; background:var(--color-primary); color:#fff; border-radius:20px; font-size:13px; font-weight:600; }

.tab-pane { display:none; }
.tab-pane.active { display:flex; flex-direction:column; flex:1; overflow-y:auto; }

.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>

<script>
var DATA = null;
var filters = { cat: '', status: '', mod: '', student: '' };
(function() {
  try { DATA = JSON.parse(document.getElementById('page-data').textContent); } catch(e) { return; }
  document.getElementById('sysCount').textContent = DATA.systemLogs.length;
  document.getElementById('cusCount').textContent = DATA.customRecords.length;
  /* PR-H+: 把日志数据存到 localStorage,供 log_edit.html 的 ?lid= 回填使用;
     合并本地的修改记录(updated_at + history)而不是覆盖 */
  try {
    var stored = JSON.parse(localStorage.getItem('xzd_logs') || '[]');
    var byId = {};
    stored.forEach(function(s) { byId[s.log_id] = s; });
    DATA.systemLogs = DATA.systemLogs.map(function(s) {
      var local = byId[s.log_id];
      if (local && (local.updated_at || (local.history && local.history.length))) {
        return Object.assign({}, s, {
          updated_at: local.updated_at || s.updated_at,
          history: Array.isArray(local.history) && local.history.length ? local.history : (s.history || [])
        });
      }
      return s;
    });
    localStorage.setItem('xzd_logs', JSON.stringify(DATA.systemLogs));
  } catch(e) {}
  // PR-G: URL 参数联动 (?student= ?cat=)
  var p = new URLSearchParams(window.location.search);
  if (p.get('student')) {
    filters.student = p.get('student');
    document.getElementById('studentFilterName').textContent = filters.student;
    document.getElementById('studentFilterBar').classList.add('show');
    switchSource('system');
  }
  if (p.get('cat')) {
    filterCat(p.get('cat'));
  }
  renderSystem();
  renderCustom();
  // 复用 log_edit.html 的横向滚动增强 (桌面端鼠标支持)
  ['catChips','stChips','modChips'].forEach(function(id) {
    var w = document.getElementById(id);
    if (w) initHScroll(w);
  });
})();

    + '<span style="font-size:11px;color:#9CA3AF;">' + log.time + '</span>'

    + '<h3 style="font-size:18px;font-weight:700;color:#111827;margin-bottom:8px;">' + log.title + '</h3>'
    + '<div style="font-size:11px;color:#888;margin-bottom:12px;">关联:<span style="color:#111827;font-weight:600;">' + log.linked_student + '</span> · ' + (log.status === 'submitted' ? '已提交' : '草稿') + '</div>'
    + '<div style="font-size:11px;color:#888;margin-bottom:8px;line-height:1.6;">'
    + '<span style="margin-right:14px;">🕒 创建:<span style="color:#111827;font-weight:600;">' + created + '</span></span>'
    + (isModified ? '<span>✏️ 最近修改:<span style="color:#1E5AE6;font-weight:600;">' + updated + '</span></span>' : '<span style="color:#16A34A;">✓ 创建后未修改</span>')
    + '</div>'

    + '<button data-close style="flex:1;height:42px;background:#F2F3F5;color:#444;border:0;border-radius:21px;font-size:14px;font-weight:600;cursor:pointer;">关闭</button>'
    + '<a href="counselor_log_edit.html?lid=' + encodeURIComponent(log.log_id) + '" style="flex:1;height:42px;background:#1E5AE6;color:#fff;border-radius:21px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;text-decoration:none;">编辑此日志</a>'
    + '</div></div>';
  document.body.appendChild(m);
  m.querySelector('[data-close]').onclick = function() { m.remove(); };

}

/* 横向滚动 carousel 增强(桌面端鼠标支持) — 复用 log_edit.html */
function initHScroll(wrapper) {
  if (!wrapper) return;
  var scroll = wrapper.querySelector(':scope > .hscroll-area') || wrapper;
  // chip-row 直接就是 flex,不需要内部 area
  var navBtns = wrapper.querySelectorAll('.nav-btn');
  var leftBtn = navBtns[0], rightBtn = navBtns[1];
  // 滚轮 hijack
  scroll.addEventListener('wheel', function(e) {
    if (e.deltaY === 0) return;
    e.preventDefault();
    scroll.scrollLeft += e.deltaY;
  }, { passive: false });
  // 拖拽
  var isDown = false, startX = 0, startScroll = 0;
  scroll.addEventListener('mousedown', function(e) {
    isDown = true; startX = e.pageX; startScroll = scroll.scrollLeft;
    scroll.style.cursor = 'grabbing';
  });
  ['mouseleave', 'mouseup'].forEach(function(evt) {
    scroll.addEventListener(evt, function() {
      isDown = false; scroll.style.cursor = '';
    });
  });
  scroll.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    e.preventDefault();
    scroll.scrollLeft = startScroll - (e.pageX - startX) * 1.5;
  });
  // 键盘左右箭头
  scroll.setAttribute('tabindex', '0');
  scroll.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); scroll.scrollBy({ left: -120, behavior: 'smooth' }); }
    if (e.key === 'ArrowRight') { e.preventDefault(); scroll.scrollBy({ left:  120, behavior: 'smooth' }); }
  });
}

  var m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:flex;align-items:center;justify-content:center;padding:0 32px;';

    + '<div style="padding:24px 20px;text-align:center;">'

    + '<div style="font-size:16px;font-weight:700;color:#191919;margin-top:10px;">' + o.title + '</div>'
    + '<div style="font-size:12px;color:#888;margin-top:6px;line-height:1.6;">' + o.desc + '</div>'
    + '</div>'
    + '<div style="display:flex;border-top:1px solid #F0F0F0;">'
    + '<button data-cancel style="flex:1;height:48px;background:#fff;color:#888;font-size:15px;border:none;border-right:1px solid #F0F0F0;cursor:pointer;">取消</button>'
    + '<button data-ok style="flex:1;height:48px;background:#fff;color:' + (o.danger?'#DC2626':'#1E5AE6') + ';font-size:15px;font-weight:600;border:none;cursor:pointer;">确认</button>'
    + '</div></div>';
  document.body.appendChild(m);
  m.querySelector('[data-cancel]').onclick = function() { m.remove(); };
  m.querySelector('[data-ok]').onclick = function() { m.remove(); o.onConfirm && o.onConfirm(); };
}
function toast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:999;';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 1800);
}
