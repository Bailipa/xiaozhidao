<!DOCTYPE html>
<!--
  API Contract:
  GET /api/admin/alert-rules
  Response 200: {
    "late_return": {
      "cutoff_time": "HH:mm",
      "reopen_time": "HH:mm",
      "valid_event_types": ["string"],
      "warning_lead_minutes": int
    },
    "risk_levels": [
      { "code":"high", "name":"红档", "color":"#DC2626", "rule":"string" },
      { "code":"mid", "name":"黄档", "color":"#FA9D3B", "rule":"string" },
      { "code":"low", "name":"蓝档", "color":"#3B82F6", "rule":"string" }
    ],
    "notification": {
      "wechat_enabled": bool,
      "sms_fallback_enabled": bool,
      "notify_admin_on_red": bool
    }
  }
  PUT /api/admin/alert-rules
  Request: same structure (partial update)
  Response 200: { "updated_at":"ISO-8601" }
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>预警规则设置 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --success:#07C160; --warning:#FA9D3B; --danger:#FA5151; --info:#3B82F6; --bg-page:#F7F7F7; --bg-card:#FFFFFF; --divider:#F0F0F0; --text-primary:#191919; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding-bottom:80px; }
.section-h { padding:16px 20px 6px; font-size:12px; color:var(--text-secondary); font-weight:600; }
.card { background:#fff; margin:0 16px 12px; border-radius:12px; overflow:hidden; }
.cell { display:flex; align-items:center; padding:14px 16px; gap:12px; }
.cell + .cell { border-top:1px solid var(--divider); }
.cell .k { font-size:14px; color:var(--text-primary); flex:1; }
.cell .v { font-size:13px; color:var(--text-secondary); }
.cell .arrow { color:#C0C4CC; font-size:16px; }
.toggle { width:44px; height:24px; border-radius:12px; background:var(--success); position:relative; flex-shrink:0; }
.toggle::after { content:''; position:absolute; top:2px; right:2px; width:20px; height:20px; background:#fff; border-radius:50%; box-shadow:0 1px 2px rgba(0,0,0,0.2); }
.toggle.off { background:#E5E7EB; }
.toggle.off::after { right:auto; left:2px; }
.risk-cell { display:flex; align-items:center; padding:14px 16px; gap:12px; }
.risk-cell + .risk-cell { border-top:1px solid var(--divider); }
.risk-cell .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.risk-cell .info { flex:1; min-width:0; }
.risk-cell .name { font-size:14px; font-weight:600; color:var(--text-primary); }
.risk-cell .rule { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.risk-cell .arrow { color:#C0C4CC; }
.event-types { padding:8px 16px 14px; font-size:11px; color:var(--text-secondary); line-height:1.8; }
.event-types .tag { display:inline-block; margin:4px 4px 0 0; padding:3px 8px; background:#EEF2FF; color:var(--color-primary); border-radius:4px; font-size:10px; }
.action-bar { background:#fff; padding:12px 16px 20px; display:flex; gap:12px; position:absolute; bottom:0; left:0; right:0; border-top:1px solid var(--divider); }
.btn { flex:1; height:44px; border-radius:22px; font-size:15px; font-weight:600; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; }
.btn.primary { background:var(--color-primary); color:#fff; }
.btn.secondary { background:#F2F3F5; color:#444; }
.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
<body>
<div class="phone-shell">
<script type="application/json" id="page-data">
{
  "late_return": {
    "cutoff_time": "22:30",
    "reopen_time": "06:00",
    "valid_event_types": ["人脸认证成功", "人证比对通过", "合法卡认证成功"],
    "warning_lead_minutes": 30
  },
  "risk_levels": [
    { "code":"high", "name":"红档", "color":"#DC2626", "rule":"晚于 23:00 入校 / 凌晨入校 / 连续 2 天晚归" },
    { "code":"mid", "name":"黄档", "color":"#FA9D3B", "rule":"22:30-23:00 之间入校 / 单次晚归" },
    { "code":"low", "name":"蓝档", "color":"#3B82F6", "rule":"22:00-22:30 之间入校(提醒级)" }
  ],
  "notification": {
    "wechat_enabled": true,
    "sms_fallback_enabled": true,
    "notify_admin_on_red": true
  }
}
</script>
<div class="status-bar">
  <span>12:20</span>
  <div class="flex gap-1.5 text-[#000]">
    <iconify-icon icon="mingcute:signal-fill"></iconify-icon>
    <iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
    <iconify-icon icon="mingcute:battery-fill"></iconify-icon>
  </div>
</div>
<div class="nav-bar">
  <a class="p-2 -ml-2" href="secretary_profile.html"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
  <h1 class="flex-1 text-center text-base font-bold text-gray-900">预警规则</h1>
  <a class="p-2 -mr-2" href="#"><iconify-icon class="text-xl text-gray-400" icon="solar:restart-bold"></iconify-icon></a>
</div>
<div class="content">
  <div class="section-h">晚归判定时间窗</div>
  <div class="card">
    <a class="cell" href="#">
      <span class="k">关寝时间</span>
      <span class="v">22:30</span>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
    <a class="cell" href="#">
      <span class="k">重开时间</span>
      <span class="v">06:00</span>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
    <a class="cell" href="#">
      <span class="k">提前提醒</span>
      <span class="v">30 分钟</span>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
  </div>
  <div class="event-types">
    <div style="color:var(--text-primary);font-weight:600;margin-bottom:6px;">合法事件类型(白名单)</div>
    <span class="tag">人脸认证成功</span><span class="tag">人证比对通过</span><span class="tag">合法卡认证成功</span>
    <div style="margin-top:8px;">仅以上 3 种事件类型纳入异常判定,其他事件自动忽略。</div>
  </div>

  <div class="section-h">风险等级</div>
  <div class="card">
    <a class="risk-cell" href="#">
      <div class="dot" style="background:#DC2626;"></div>
      <div class="info">
        <div class="name">红档</div>
        <div class="rule">晚于 23:00 入校 / 凌晨入校 / 连续 2 天晚归</div>
      </div>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
    <a class="risk-cell" href="#">
      <div class="dot" style="background:#FA9D3B;"></div>
      <div class="info">
        <div class="name">黄档</div>
        <div class="rule">22:30-23:00 之间入校 / 单次晚归</div>
      </div>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
    <a class="risk-cell" href="#">
      <div class="dot" style="background:#3B82F6;"></div>
      <div class="info">
        <div class="name">蓝档</div>
        <div class="rule">22:00-22:30 之间入校(提醒级)</div>
      </div>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
  </div>

  <div class="section-h">通知方式</div>
  <div class="card">
    <div class="cell">
      <span class="k">微信订阅消息</span>
      <div class="toggle"></div>
    </div>
    <div class="cell">
      <span class="k">短信兜底</span>
      <div class="toggle"></div>
    </div>
    <div class="cell">
      <span class="k">红档同步通知书记</span>
      <div class="toggle"></div>
    </div>
  </div>
</div>
<div class="action-bar">
  <button class="btn secondary">恢复默认</button>
  <button class="btn primary">保存设置</button>
</div>
<div class="home-indicator"><div class="bar"></div></div>
</div>
</body>
</html>
