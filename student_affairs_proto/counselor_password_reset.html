<!DOCTYPE html>
<!--
  API Contract:
  POST /api/me/password/reset
  Request: { "old_password":"string", "new_password":"string", "confirm_password":"string" }
  Response 200: { "message":"string", "last_password_change_at":"ISO-8601" }
  Response 400: { "error":"weak_password|same_as_old|mismatch" }
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>修改密码 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --color-success:#07C160; --color-danger:#DC2626; --bg-page:#F7F7F7; --text-primary:#191919; --text-regular:#444; --text-secondary:#888; --divider:#F0F0F0; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; box-shadow:0 0 50px rgba(0,0,0,0.5); border:8px solid #333; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; font-weight:600; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding:24px 20px; }
.first-tip { background:linear-gradient(135deg,#E8F0FE,#fff); border:1px solid #C7DBFB; padding:16px; border-radius:12px; display:flex; gap:12px; margin-bottom:24px; }
.first-tip .ic { width:36px; height:36px; border-radius:10px; background:rgba(30,90,230,0.12); color:var(--color-primary); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.first-tip .body { flex:1; }
.first-tip .title { font-size:14px; font-weight:600; color:var(--color-primary); }
.first-tip .desc { font-size:12px; color:var(--text-regular); margin-top:4px; line-height:1.6; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; font-weight:600; }
.field .input-wrap { position:relative; }
.field input { width:100%; height:48px; padding:0 44px; border:1px solid var(--divider); border-radius:12px; font-size:14px; color:var(--text-primary); background:#fff; outline:none; box-sizing:border-box; }
.field input:focus { border-color:var(--color-primary); }
.field .prefix-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; color:var(--text-secondary); }
.field .suffix-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:18px; color:var(--text-secondary); cursor:pointer; }
.field .meter { display:flex; gap:4px; margin-top:8px; height:4px; }
.field .meter span { flex:1; background:#E5E7EB; border-radius:2px; transition:background 0.2s; }
.field .meter span.weak { background:#DC2626; }
.field .meter span.medium { background:#F59E0B; }
.field .meter span.strong { background:#07C160; }
.field .meter-text { font-size:11px; color:var(--text-secondary); margin-top:4px; }
.field-error { font-size:11px; color:var(--color-danger); margin-top:6px; min-height:14px; }
.btn-primary { width:100%; height:48px; border-radius:24px; background:var(--color-primary); color:#fff; font-size:15px; font-weight:600; border:none; cursor:pointer; box-shadow:0 4px 12px rgba(30,90,230,0.3); margin-top:24px; }
.btn-primary:disabled { background:#C0C4CC; box-shadow:none; }
.rules { background:#fff; border-radius:12px; padding:14px 16px; margin-top:8px; }
.rules .h { font-size:12px; color:var(--text-secondary); font-weight:600; margin-bottom:8px; }
.rules li { font-size:12px; color:var(--text-regular); line-height:1.8; display:flex; gap:6px; align-items:center; }
.rules li.ok { color:#07C160; }
.rules li.fail { color:var(--text-secondary); }
.home-indicator { height:34px; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; background:#fff; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
<body>
<div class="phone-shell">
<div class="status-bar">
<span>12:20</span>
<div class="flex gap-1.5">
<iconify-icon icon="mingcute:signal-fill"></iconify-icon>
<iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
<iconify-icon icon="mingcute:battery-fill"></iconify-icon>
</div>
</div>
<div class="nav-bar">
<a class="p-2 -ml-2" href="login.html" aria-label="登录" id="backBtn"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
<h1 class="flex-1 text-center text-base font-bold text-gray-900">修改密码</h1>
<span class="p-2 -mr-2 w-8"></span>
</div>
<div class="content">
<form id="xzdForm" onsubmit="event.preventDefault();" novalidate autocomplete="on">
<div class="first-tip" id="firstTip">
<div class="ic"><iconify-icon icon="solar:shield-keyhole-bold"></iconify-icon></div>
<div class="body">
<div class="title">首次登录,请重置密码</div>
<div class="desc">为保障账号安全,首次登录需立即修改由单位下发的初始密码。修改成功后将自动跳转微信绑定。</div>
</div>
</div>
<div class="field">
<label for="oldPassword">当前密码</label>
<div class="input-wrap">
<iconify-icon class="prefix-icon" icon="solar:lock-password-linear"></iconify-icon>
<input id="oldPassword" placeholder="请输入当前密码" type="password"/>
<iconify-icon class="suffix-icon" data-toggle="oldPassword" icon="solar:eye-linear"></iconify-icon>
</div>
<div class="field-error" id="oldError"></div>
</div>
<div class="field">
<label for="newPassword">新密码</label>
<div class="input-wrap">
<iconify-icon class="prefix-icon" icon="solar:lock-keyhole-minimalistic-linear"></iconify-icon>
<input id="newPassword" placeholder="不少于 6 位" type="password"/>
<iconify-icon class="suffix-icon" data-toggle="newPassword" icon="solar:eye-linear"></iconify-icon>
</div>
<div class="meter" id="meter">
<span></span><span></span><span></span>
</div>
<div class="meter-text" id="meterText">请输入新密码</div>
</div>
<div class="field">
<label for="confirmPassword">确认新密码</label>
<div class="input-wrap">
<iconify-icon class="prefix-icon" icon="solar:lock-keyhole-minimalistic-linear"></iconify-icon>
<input id="confirmPassword" placeholder="再次输入新密码" type="password"/>
<iconify-icon class="suffix-icon" data-toggle="confirmPassword" icon="solar:eye-linear"></iconify-icon>
</div>
<div class="field-error" id="confirmError"></div>
</div>
<div class="rules">
<div class="h">密码强度要求</div>
<ul id="rules">
<li data-rule="len"><iconify-icon icon="solar:close-circle-linear"></iconify-icon><span>长度不少于 6 位</span></li>
<li data-rule="diff"><iconify-icon icon="solar:close-circle-linear"></iconify-icon><span>与旧密码不同</span></li>
<li data-rule="match"><iconify-icon icon="solar:close-circle-linear"></iconify-icon><span>两次输入一致</span></li>
</ul>
</div>
<button class="btn-primary" id="submitBtn" disabled>确认提交</button>
</div></form>

<div class="home-indicator"><div class="bar"></div></div>
</div>
<script>
const url = new URLSearchParams(location.search);
const isFirst = url.get('first') === '1';
if (!isFirst) document.getElementById('firstTip').style.display = 'none';

document.querySelectorAll('[data-toggle]').forEach(ic => {
  ic.addEventListener('click', () => {
    const id = ic.dataset.toggle;
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    ic.setAttribute('icon', input.type === 'text' ? 'solar:eye-closed-linear' : 'solar:eye-linear');
  });
});

function score(pwd) {
  let s = 0;
  if (pwd.length >= 6) s++;
  if (pwd.length >= 10) s++;
  if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) s++;
  if (/\d/.test(pwd)) s++;
  if (/[^A-Za-z0-9]/.test(pwd)) s++;
  return Math.min(s, 3);
}

function refresh() {
  const oldP = document.getElementById('oldPassword').value;
  const newP = document.getElementById('newPassword').value;
  const cfmP = document.getElementById('confirmPassword').value;
  const meter = document.getElementById('meter').children;
  const meterText = document.getElementById('meterText');
  const sc = score(newP);
  meter[0].className = sc >= 1 ? (sc === 1 ? 'weak' : sc === 2 ? 'medium' : 'strong') : '';
  meter[1].className = sc >= 2 ? (sc === 2 ? 'medium' : 'strong') : '';
  meter[2].className = sc >= 3 ? 'strong' : '';
  meterText.textContent = sc === 0 ? '请输入新密码' : sc === 1 ? '弱:仅长度合格' : sc === 2 ? '中:含字母与数字' : '强:含大小写/特殊字符';

  const lenOk = newP.length >= 6;
  const diffOk = oldP && newP && newP !== oldP;
  const matchOk = newP && cfmP && newP === cfmP;
  updateRule('len', lenOk);
  updateRule('diff', diffOk);
  updateRule('match', matchOk);

  document.getElementById('oldError').textContent = oldP && newP && newP === oldP ? '新密码不能与旧密码相同' : '';
  document.getElementById('confirmError').textContent = cfmP && newP !== cfmP ? '两次输入不一致' : '';
  document.getElementById('submitBtn').disabled = !(lenOk && diffOk && matchOk);
}

function updateRule(name, ok) {
  const li = document.querySelector(`[data-rule="${name}"]`);
  li.classList.toggle('ok', ok);
  li.classList.toggle('fail', !ok);
  li.querySelector('iconify-icon').setAttribute('icon', ok ? 'solar:check-circle-bold' : 'solar:close-circle-linear');
}

['oldPassword','newPassword','confirmPassword'].forEach(id => {
  document.getElementById(id).addEventListener('input', refresh);
});

document.getElementById('submitBtn').addEventListener('click', () => {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中…';
  setTimeout(() => {
    if (isFirst) {
      window.location.href = 'counselor_wechat_binding.html?bound=0';
    } else {
      window.location.href = 'counselor_account_security.html';
    }
  }, 600);
});
</script>
<script>
/* PR-H.3 v3: nav-back 智能返回 — 优先 referrer, 其次当前 URL */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    /* referrer: 如果 referrer 是同源 counselor_*.html, 用它作为回退目标 */
    var refBase = null, refParts = [];
    if (document.referrer) {
      try {
        var refUrl = new URL(document.referrer);
        var refName = refUrl.pathname.substring(refUrl.pathname.lastIndexOf('/') + 1);
        if (refName.indexOf('counselor_') === 0 && refName.indexOf('.html') !== -1) {
          refBase = refName;
          var refSp = new URLSearchParams(refUrl.search);
          K.forEach(function(k){var v=refSp.get(k); if(v!=null && v!=='') refParts.push(k+'='+encodeURIComponent(v));});
        }
      } catch(e) {}
    }
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back, .nav-bar a[href^="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      var useParts = parts.length ? parts : refParts;
      if (!useParts.length) return;
      /* 如果 referrer 可用, 用 referrer 作为基础; 否则保留原 base */
      var finalBase = refBase || base;
      a.setAttribute('href', finalBase + '?' + useParts.join('&'));
    });
  } catch(e) { console.error('PR-H.3 v3 nav-back error:', e); }
})();
</script>
</body>
</html>
