<!DOCTYPE html>
<!--
  API Contract:
  GET /api/admin/permissions
  Response 200: {
    "current_user": { "username":"string", "role":"学工书记", "scopes":["智能技术学部"] },
    "assignable_roles": [
      { "code":"admin", "name":"系统管理员", "description":"string", "can_assign":bool },
      { "code":"secretary", "name":"学工书记", "description":"string", "can_assign":bool },
      { "code":"counselor", "name":"辅导员", "description":"string", "can_assign":bool }
    ],
    "permission_modules": [
      { "code":"import_data", "name":"数据导入", "admin":bool, "secretary":bool, "counselor":bool },
      { "code":"anomaly_review", "name":"异常审核", ... },
      ...
    ]
  }
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>系统管理权限 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --success:#07C160; --danger:#FA5151; --bg-page:#F7F7F7; --bg-card:#FFFFFF; --divider:#F0F0F0; --text-primary:#191919; --text-regular:#444; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; }
.role-card { margin:16px; padding:18px; background:linear-gradient(135deg,#1E5AE6 0%,#7C3AED 100%); color:#fff; border-radius:12px; }
.role-card .lbl { font-size:11px; opacity:0.85; }
.role-card .name { font-size:18px; font-weight:700; margin-top:4px; }
.role-card .scopes { font-size:12px; opacity:0.9; margin-top:4px; }
.section-h { padding:14px 20px 6px; font-size:12px; color:var(--text-secondary); font-weight:600; }
.card { background:#fff; margin:0 16px 12px; border-radius:12px; overflow:hidden; }
.role-cell { display:flex; align-items:center; padding:14px 16px; gap:12px; }
.role-cell + .role-cell { border-top:1px solid var(--divider); }
.role-cell .icon { width:36px; height:36px; border-radius:8px; background:#EEF2FF; color:var(--color-primary); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.role-cell .info { flex:1; min-width:0; }
.role-cell .name { font-size:14px; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:6px; }
.role-cell .name .you { font-size:10px; padding:1px 6px; background:#EEF2FF; color:var(--color-primary); border-radius:4px; }
.role-cell .desc { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.role-cell .arrow { color:#C0C4CC; font-size:16px; }
.matrix { margin:0 16px 12px; background:#fff; border-radius:12px; overflow:hidden; }
.matrix table { width:100%; border-collapse:collapse; font-size:11px; }
.matrix th, .matrix td { padding:10px 8px; text-align:center; border-bottom:1px solid var(--divider); }
.matrix th { background:#F7F7F7; color:var(--text-secondary); font-weight:600; }
.matrix td.k { text-align:left; color:var(--text-primary); }
.matrix .yes { color:var(--success); font-size:14px; }
.matrix .no { color:#C0C4CC; font-size:14px; }
.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
<body>
<div class="phone-shell">
<script type="application/json" id="page-data">
{
  "current_user": { "username":"sec001", "role":"学工书记", "scopes":["智能技术学部"] },
  "assignable_roles": [
    { "code":"admin", "name":"系统管理员", "description":"全系统最高权限,仅可由校级管理员授予", "can_assign":false },
    { "code":"secretary", "name":"学工书记", "description":"学部内管理权限,可创建辅导员账号", "can_assign":false },
    { "code":"counselor", "name":"辅导员", "description":"班级管理权限,可处理所带班级数据", "can_assign":true }
  ],
  "permission_modules": [
    { "code":"import_data", "name":"数据导入", "admin":true, "secretary":true, "counselor":false },
    { "code":"anomaly_review", "name":"异常审核", "admin":true, "secretary":true, "counselor":true },
    { "code":"alert_rules", "name":"预警规则设置", "admin":true, "secretary":true, "counselor":false },
    { "code":"account_manage", "name":"账号管理", "admin":true, "secretary":true, "counselor":false },
    { "code":"report_export", "name":"报表导出", "admin":true, "secretary":true, "counselor":false }
  ]
}
</script>
<div class="status-bar">
  <span>12:20</span>
  <div class="flex gap-1.5 text-[#000]">
    <iconify-icon icon="mingcute:signal-fill"></iconify-icon>
    <iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
    <iconify-icon icon="mingcute:battery-fill"></iconify-icon>
  </div>
</div>
<div class="nav-bar">
  <a class="p-2 -ml-2" href="secretary_profile.html" aria-label="我的"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
  <h1 class="flex-1 text-center text-base font-bold text-gray-900">系统权限</h1>
  <span class="p-2 -mr-2 w-8"></span>
</div>
<div class="content">
  <div class="role-card">
    <div class="lbl">当前身份</div>
    <div class="name">学工书记</div>
    <div class="scopes">管辖:智能技术学部 · 4 班级 · 128 学生</div>
  </div>

  <div class="section-h">可分配角色</div>
  <div class="card">
    <div class="role-cell">
      <div class="icon" style="background:#FEE2E2;color:#DC2626;"><iconify-icon icon="solar:shield-keyhole-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">系统管理员</div>
        <div class="desc">全系统最高权限,仅校级管理员可授予</div>
      </div>
      <span style="font-size:10px;color:var(--text-secondary);">不可分配</span>
    </div>
    <div class="role-cell">
      <div class="icon" style="background:#EEF2FF;color:var(--color-primary);"><iconify-icon icon="solar:user-check-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">学工书记 <span class="you">本角色</span></div>
        <div class="desc">学部内管理权限,可创建辅导员账号</div>
      </div>
    </div>
    <a class="role-cell" href="secretary_counselors.html">
      <div class="icon" style="background:#ECFDF5;color:var(--success);"><iconify-icon icon="solar:user-speak-rounded-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">辅导员</div>
        <div class="desc">班级管理权限,可处理所带班级数据</div>
      </div>
      <iconify-icon class="arrow" icon="solar:alt-arrow-right-linear"></iconify-icon>
    </a>
  </div>

  <div class="section-h">权限矩阵</div>
  <div class="matrix">
    <table>
      <thead>
        <tr>
          <th style="text-align:left;padding-left:16px;">功能模块</th>
          <th>管理员</th><th>书记</th><th>辅导员</th>
        </tr>
      </thead>
      <tbody>
        <tr><td class="k" style="padding-left:16px;">数据导入</td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="no" icon="solar:close-circle-bold"></iconify-icon></td></tr>
        <tr><td class="k" style="padding-left:16px;">异常审核</td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td></tr>
        <tr><td class="k" style="padding-left:16px;">预警规则</td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="no" icon="solar:close-circle-bold"></iconify-icon></td></tr>
        <tr><td class="k" style="padding-left:16px;">账号管理</td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="no" icon="solar:close-circle-bold"></iconify-icon></td></tr>
        <tr><td class="k" style="padding-left:16px;">报表导出</td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="yes" icon="solar:check-circle-bold"></iconify-icon></td><td><iconify-icon class="no" icon="solar:close-circle-bold"></iconify-icon></td></tr>
      </tbody>
    </table>
  </div>
</div>
<div class="home-indicator"><div class="bar"></div></div>
</div>
</body>
</html>
