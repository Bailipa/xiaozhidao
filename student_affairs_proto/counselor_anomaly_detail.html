.content { flex:1; overflow-y:auto; }
.card { background:#fff; border-radius:16px; margin:12px 16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,0.02); }
.timeline-vertical { position:relative; padding-left:20px; margin-left:10px; border-left:1px solid #E5E7EB; }
.timeline-vertical-item { position:relative; padding-bottom:24px; }
.timeline-vertical-item::before { content:''; position:absolute; left:-24px; top:0; width:8px; height:8px; border-radius:50%; background:#1E5AE6; border:2px solid #fff; box-shadow:0 0 0 2px #E8F0FE; }

.action-bar { height:80px; background:#fff; border-top:1px solid #F3F4F6; display:flex; align-items:center; padding:0 16px 20px; flex-shrink:0; }
.status-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.status-chip.attention { background:#FFF7E6; color:#FA9D3B; }
.status-chip.talked { background:#E8F0FE; color:#1E5AE6; }
.status-chip.closed { background:#D1FAE5; color:#07C160; }

<script>
let picked = '已关注';
let curAnomalyId = 'AN001';
function showFollowUp() { document.getElementById('followUpModal').classList.remove('hidden'); }
function hideFollowUp() { document.getElementById('followUpModal').classList.add('hidden'); }

function pickStatus(el) {
  picked = el.dataset.status;
  document.querySelectorAll('[data-status]').forEach(x => {
    x.style.background = '#F9FAFB';
    x.style.color = '#9CA3AF';
    x.style.borderColor = '#F3F4F6';
  });
  el.style.background = 'rgba(30,90,230,0.08)';
  el.style.color = '#1E5AE6';
  el.style.borderColor = '#1E5AE6';
}
document.querySelector('[data-status="已关注"]').click();


function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
function statusChipClass(s) {
  if (s === '未跟进') return 'attention';
  if (s === '已关注') return 'attention';
  if (s === '已约谈') return 'talked';
  if (s === '已结案') return 'closed';
  return '';
}
function submitFollowUp() {
  const ta = document.querySelector('textarea').value.trim();
  if (!ta) { alert('请填写跟进说明'); return; }
  const now = new Date();
  const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const tl = document.getElementById('timeline');
  const dot = picked === '已结案' ? 'green' : '';
  const newItem = document.createElement('div');
  newItem.className = `timeline-vertical-item ${dot} pb-0`;
  newItem.innerHTML = `
    <div class="text-xs font-bold text-gray-900">王辅导员 更新为「${picked}」</div>
    <div class="text-[10px] text-gray-400 mt-0.5">${stamp}</div>
    <div class="text-xs text-gray-500 mt-2 bg-gray-50 p-2 rounded-lg">${escapeHtml(ta)}</div>
  `;
  tl.appendChild(newItem);
  const statusChip = document.getElementById('currentStatus');
  statusChip.textContent = picked;
  statusChip.className = `status-chip ${statusChipClass(picked)}`;
  document.getElementById('followCount').textContent = tl.children.length;
  document.querySelector('textarea').value = '';
  hideFollowUp();
}

/* PR-F: ?anomaly= 解析与渲染 */
function bindAnomaly(id) {
  const data = JSON.parse(document.getElementById('page-data').textContent);
  const a = data.anomalies[id] || data.anomalies['AN001'];
  curAnomalyId = id;

  const header = document.getElementById('riskHeader');
  header.className = 'card ' + a.risk_class + ' flex items-center justify-between';
  document.getElementById('riskIcon').setAttribute('icon', a.risk_icon);
  document.getElementById('riskIcon').style.color = a.risk_color;
  const title = document.getElementById('riskTitle');
  title.textContent = a.risk;
  title.style.color = a.risk_color;
  const status = document.getElementById('currentStatus');
  status.textContent = a.status;
  status.className = 'status-chip ' + statusChipClass(a.status);
  const serial = document.getElementById('anomalySerial');
  if (serial) serial.textContent = a.serial;
  header.querySelector('.text-\\[10px\\]').style.color = a.risk_color + '99';

  document.getElementById('studentName').textContent = a.student_name;
  document.getElementById('studentMeta').textContent = a.student_class + ' · ' + a.student_no;
  document.getElementById('studentAvatar').src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(a.student_avatar) + '&background=1E5AE6&color=fff&size=128&bold=true&font-size=0.5';
  const v = document.getElementById('viewProfileLink');
  v.href = 'counselor_student_detail.html?no=' + encodeURIComponent(a.student_no);

  document.getElementById('anomalyType').textContent = a.type;
  document.getElementById('anomalyTime').textContent = a.time;
  document.getElementById('anomalyContent').textContent = a.content;

  const tl = document.getElementById('timeline');
  tl.innerHTML = a.timeline.map(function(t){
    const cls = 'timeline-vertical-item' + (t.kind ? ' ' + t.kind : '') + ' pb-0';
    return '<div class="' + cls + '">' +
      '<div class="text-xs font-bold text-gray-900">' + escapeHtml(t.title) + '</div>' +
      '<div class="text-[10px] text-gray-400 mt-0.5">' + escapeHtml(t.time) + '</div>' +
      '<div class="text-xs text-gray-500 mt-2 bg-gray-50 p-2 rounded-lg">' + escapeHtml(t.note) + '</div>' +
    '</div>';
  }).join('');
  document.getElementById('followCount').textContent = a.timeline.length;
}
bindAnomaly(new URLSearchParams(window.location.search).get('anomaly') || 'AN001');

/* PR-H.2: preserve ?filter= ?student= when returning to anomalies list */
(function(){
  var sp = new URLSearchParams(window.location.search);
  var parts = [];
  ['filter','student','from'].forEach(function(k){var v=sp.get(k); if(v!=null&&v!=='') parts.push(k+'='+encodeURIComponent(v));});
  if (!parts.length) return;
  var back = document.getElementById('navBack');
  if (back) back.setAttribute('href', 'counselor_anomalies.html?' + parts.join('&'));
})();
</script></form>

<script>
/* PR-H.3 v3: nav-back 智能返回 — 优先 referrer, 其次当前 URL */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    /* referrer: 如果 referrer 是同源 counselor_*.html, 用它作为回退目标 */
    var refBase = null, refParts = [];
    if (document.referrer) {
      try {
        var refUrl = new URL(document.referrer);
        var refName = refUrl.pathname.substring(refUrl.pathname.lastIndexOf('/') + 1);
        if (refName.indexOf('counselor_') === 0 && refName.indexOf('.html') !== -1) {
          refBase = refName;
          var refSp = new URLSearchParams(refUrl.search);
          K.forEach(function(k){var v=refSp.get(k); if(v!=null && v!=='') refParts.push(k+'='+encodeURIComponent(v));});
        }
      } catch(e) {}
    }
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back, .nav-bar a[href^="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      var useParts = parts.length ? parts : refParts;
      if (!useParts.length) return;
      /* 如果 referrer 可用, 用 referrer 作为基础; 否则保留原 base */
      var finalBase = refBase || base;
      a.setAttribute('href', finalBase + '?' + useParts.join('&'));
    });
  } catch(e) { console.error('PR-H.3 v3 nav-back error:', e); }
})();
</script>
