<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新建提醒 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        :root { --color-primary: #1E5AE6; --color-bg-page: #F5F6F8; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
        .phone-shell { width: 375px; height: 812px; background: var(--color-bg-page); border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .status-bar { height: 44px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #000; flex-shrink: 0; line-height: 1; }
        .status-bar iconify-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-size: 16px;
        }
        .nav-bar { height: 44px; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; border-bottom: 1px solid #F3F4F6; }
        .content { flex: 1; overflow-y: auto; }
        .form-group { background: #fff; border-radius: 16px; margin: 12px 16px; padding: 4px 16px; }
        .input-row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #F3F4F6; last:border-0; }
        .input-row label { width: 100px; font-size: 14px; color: #6B7280; }
        .input-row input, .input-row select { flex: 1; border: 0; outline: none; font-size: 14px; text-align: right; color: #111827; }
        .action-bar { height: 80px; background: #fff; border-top: 1px solid #F3F4F6; display: flex; align-items: center; padding: 0 16px 20px; flex-shrink: 0; }

        /* 学生选择器(底部弹起) */
        .picker-trigger { display: flex; align-items: center; flex: 1; gap: 4px; cursor: pointer; min-width: 0; }
        .picker-trigger .value { flex: 1; text-align: right; font-size: 14px; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .picker-trigger .value.placeholder { color: #9CA3AF; }
        .picker-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; display: none; }
        .picker-mask.show { display: block; }
        .picker-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 61; background: #fff; border-radius: 16px 16px 0 0; max-height: 80vh; display: none; flex-direction: column; }
        .picker-sheet.show { display: flex; animation: pickerUp 0.25s ease-out; }
        @keyframes pickerUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .picker-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #F0F0F0; flex-shrink: 0; }
        .picker-header .title { font-size: 16px; font-weight: 600; color: #191919; }
        .picker-header .cancel { font-size: 14px; color: #6B7280; cursor: pointer; }
        .picker-search { padding: 12px 16px 4px; flex-shrink: 0; }
        .picker-search input { width: 100%; padding: 10px 12px; background: #F5F5F5; border: 0; border-radius: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
        .picker-filters { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; flex-shrink: 0; }
        .picker-chip { padding: 5px 12px; background: #F5F5F5; color: #444; border-radius: 14px; font-size: 12px; white-space: nowrap; border: 1px solid transparent; cursor: pointer; flex-shrink: 0; }
        .picker-chip.on { background: #EFF6FF; color: #1E5AE6; border-color: #1E5AE6; font-weight: 600; }
        .picker-list { flex: 1; overflow-y: auto; }
        .picker-class-row { display: flex; align-items: center; padding: 12px 16px; background: #F8F9FA; border-top: 1px solid #F0F0F0; gap: 12px; cursor: pointer; }
        .picker-class-row:hover { background: #F0F2F5; }
        .picker-class-row .name { font-size: 14px; font-weight: 600; color: #191919; }
        .picker-class-row .meta { font-size: 11px; color: #888; margin-top: 2px; }
        .picker-row { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-top: 1px solid #F5F5F5; gap: 12px; cursor: pointer; }
        .picker-row:hover { background: #FAFAFA; }
        .picker-row .name { flex: 1; font-size: 14px; color: #191919; display: flex; align-items: center; gap: 6px; }
        .picker-row .meta { font-size: 11px; color: #888; margin-top: 2px; }
        .picker-row .avatar { width: 32px; height: 32px; border-radius: 50%; background: #F0F2F5; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #444; flex-shrink: 0; }
        .picker-control { width: 20px; height: 20px; border: 1.5px solid #D1D5DB; flex-shrink: 0; box-sizing: border-box; }
        .picker-control.radio { border-radius: 50%; }
        .picker-control.checkbox { border-radius: 4px; }
        .picker-control.on { border-color: #1E5AE6; background: #1E5AE6; }
        .picker-control.checkbox.on::after { content: '✓'; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; line-height: 1; }
        .picker-control.radio.on::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; margin: 4px auto; display: block; }
        .picker-empty { text-align: center; padding: 40px 16px; color: #888; font-size: 13px; }
        .picker-footer { padding: 12px 16px 20px; border-top: 1px solid #F0F0F0; display: flex; gap: 10px; flex-shrink: 0; background: #fff; }
        .picker-btn { flex: 1; height: 44px; border-radius: 22px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 0; cursor: pointer; }
        .picker-btn.cancel { background: #F2F3F5; color: #444; }
        .picker-btn.confirm { background: #1E5AE6; color: #fff; }
        .risk-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
        .risk-tag.high { background: #FEF2F2; color: #DC2626; }
        .risk-tag.mid { background: #FFF7E6; color: #FA9D3B; }
        .risk-tag.low { background: #EFF6FF; color: #3B82F6; }
        .risk-tag.none { background: #F5F5F5; color: #888; }
    </style>
</head>
<body>
<div class="phone-shell">
<div class="status-bar">
<span>12:20</span>
<div class="flex gap-1.5 text-[#000]">
<iconify-icon icon="mingcute:signal-fill"></iconify-icon>
<iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
<iconify-icon icon="mingcute:battery-fill"></iconify-icon>
</div>
</div>
<div class="nav-bar">
<a class="p-2 -ml-2" href="counselor_reminders.html" aria-label="提醒列表">
<iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon>
</a>
<h1 class="flex-1 text-center text-base font-bold text-gray-900">新建提醒</h1>
</div>
<div class="content">
<form id="xzdForm" onsubmit="event.preventDefault();" novalidate autocomplete="on">
<div class="form-group">
<div class="input-row">
<label for="reminderTitle">提醒标题</label>
<input id="reminderTitle" name="reminderTitle" placeholder="如：明天班会通知" type="text"/>
</div>
<div class="input-row">
<label for="reminderTime">提醒时间</label>
<input type="datetime-local" id="reminderTime" name="reminderTime" value="2026-06-30T18:00"/>
</div>
</div>
<div class="form-group">
<div class="input-row" onclick="openStudentPicker('multi', [], onReminderStudentsPicked)">
<label for="reminderLead">关联范围</label>
<div class="picker-trigger">
  <span class="value placeholder" id="reminderRangeDisplay">点击选择</span>
  <iconify-icon class="text-gray-300" icon="solar:alt-arrow-right-linear"></iconify-icon>
</div>
</div>
<div class="input-row">
<label for="reminderLead">提前提醒</label>
<select id="reminderLead" name="reminderLead">
<option>30分钟</option>
<option>1小时</option>
</select>
</div>
</div>
<div class="form-group">
<textarea id="reminderContent" name="reminderContent" class="w-full p-0 py-4 h-32 outline-none text-sm text-gray-800 placeholder-gray-400" placeholder="请输入具体的提醒内容，将通过微信通知实时推送给学生..."></textarea>
</div>
</div>
<div class="action-bar">
<button class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-100" onclick="window.location.href='counselor_reminders.html'">保存并开启提醒</button>
</div>
</div>
<!-- 学生选择器(底部弹起) -->
<div class="picker-mask" id="pickerMask" onclick="closeStudentPicker()"></div>
<div class="picker-sheet" id="pickerSheet">
  <div class="picker-header">
    <span class="title" id="pickerTitle">选择学生</span>
    <a class="cancel" onclick="closeStudentPicker()">取消</a>
  </div>
  <div class="picker-search">
    <input id="pickerSearch" type="text" placeholder="🔍 搜索姓名 / 学号" oninput="renderStudentList()">
  </div>
  <div class="picker-filters" id="pickerClassFilter">
    <span class="picker-chip on" data-c="" onclick="setClassFilter('')">全部班级</span>
    <span class="picker-chip" data-c="计科1班" onclick="setClassFilter('计科1班')">计科1班 32</span>
    <span class="picker-chip" data-c="计科2班" onclick="setClassFilter('计科2班')">计科2班 34</span>
    <span class="picker-chip" data-c="软工1班" onclick="setClassFilter('软工1班')">软工1班 30</span>
    <span class="picker-chip" data-c="大数据1班" onclick="setClassFilter('大数据1班')">大数据1班 32</span>
  </div>
  <div class="picker-filters" id="pickerRiskFilter">
    <span class="picker-chip on" data-r="" onclick="setRiskFilter('')">全部风险</span>
    <span class="picker-chip" data-r="high" onclick="setRiskFilter('high')">红档</span>
    <span class="picker-chip" data-r="mid" onclick="setRiskFilter('mid')">黄档</span>
    <span class="picker-chip" data-r="low" onclick="setRiskFilter('low')">蓝档</span>
    <span class="picker-chip" data-r="none" onclick="setRiskFilter('none')">正常</span>
  </div>
  <div class="picker-list" id="pickerList"></div>
  <div class="picker-footer">
    <button class="picker-btn cancel" onclick="closeStudentPicker()">取消</button>
    <button class="picker-btn confirm" onclick="confirmStudentPicker()">确定 <span id="pickerCountText"></span></button>
  </div>
</div>
<script>
        /*
          API Contract (后端实现时按此对接):
          GET /api/me/students?keyword=&class_name=&risk_level=&page=1&size=20
          Response 200: {
            "total": int,
            "students": [
              { "student_no":"string", "student_name":"string", "class_name":"string", "risk_level":"high|mid|low|none" }
            ],
            "classes": [
              { "class_id":"string", "class_name":"string", "count":int }
            ]
          }
        */
        const STUDENTS = [
          { no: '2024001', name: '张三',   class: '计科1班',   risk: 'high' },
          { no: '2024002', name: '李四',   class: '计科1班',   risk: 'none' },
          { no: '2024003', name: '王五',   class: '计科1班',   risk: 'low'  },
          { no: '2024004', name: '赵六',   class: '计科1班',   risk: 'mid'  },
          { no: '2024005', name: '钱七',   class: '计科2班',   risk: 'none' },
          { no: '2024006', name: '孙八',   class: '计科2班',   risk: 'high' },
          { no: '2024007', name: '周九',   class: '计科2班',   risk: 'mid'  },
          { no: '2024008', name: '吴十',   class: '软工1班',   risk: 'none' },
          { no: '2024009', name: '郑十一', class: '软工1班',   risk: 'low'  },
          { no: '2024010', name: '冯十二', class: '软工1班',   risk: 'none' },
          { no: '2024011', name: '陈十三', class: '大数据1班', risk: 'mid'  },
          { no: '2024012', name: '褚十四', class: '大数据1班', risk: 'high' },
          { no: '2024013', name: '卫十五', class: '大数据1班', risk: 'none' }
        ];
        const RISK_LABEL = { high: '红档', mid: '黄档', low: '蓝档', none: '正常' };
        let pickerState = { mode: 'single', selected: new Set(), classFilter: '', riskFilter: '', callback: null };
        function openStudentPicker(mode, preSelected, callback) {
          pickerState.mode = mode;
          pickerState.selected = new Set(preSelected || []);
          pickerState.classFilter = '';
          pickerState.riskFilter = '';
          pickerState.callback = callback;
          document.getElementById('pickerTitle').textContent = mode === 'single' ? '选择学生' : '选择学生(多选)';
          document.getElementById('pickerSearch').value = '';
          document.querySelectorAll('#pickerClassFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.c === ''));
          document.querySelectorAll('#pickerRiskFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.r === ''));
          document.getElementById('pickerMask').classList.add('show');
          document.getElementById('pickerSheet').classList.add('show');
          renderStudentList();
        }
        function closeStudentPicker() {
          document.getElementById('pickerMask').classList.remove('show');
          document.getElementById('pickerSheet').classList.remove('show');
        }
        function setClassFilter(c) {
          pickerState.classFilter = c;
          document.querySelectorAll('#pickerClassFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.c === c));
          renderStudentList();
        }
        function setRiskFilter(r) {
          pickerState.riskFilter = r;
          document.querySelectorAll('#pickerRiskFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.r === r));
          renderStudentList();
        }
        function renderStudentList() {
          const search = document.getElementById('pickerSearch').value.trim().toLowerCase();
          const filtered = STUDENTS.filter(s => {
            if (pickerState.classFilter && s.class !== pickerState.classFilter) return false;
            if (pickerState.riskFilter && s.risk !== pickerState.riskFilter) return false;
            if (search && !(s.name.toLowerCase().includes(search) || s.no.includes(search))) return false;
            return true;
          });
          const list = document.getElementById('pickerList');
          if (filtered.length === 0) {
            list.innerHTML = '<div class="picker-empty">未找到匹配的学生</div>';
            document.getElementById('pickerCountText').textContent = '';
            return;
          }
          const groups = {};
          filtered.forEach(s => { if (!groups[s.class]) groups[s.class] = []; groups[s.class].push(s); });
          let html = '';
          Object.keys(groups).forEach(cls => {
            const classTotal = STUDENTS.filter(s => s.class === cls).length;
            const classStudentNos = STUDENTS.filter(s => s.class === cls).map(s => s.no);
            const selectedInClass = classStudentNos.filter(no => pickerState.selected.has(no)).length;
            const allInClassSelected = selectedInClass === classStudentNos.length;
            const controlType = pickerState.mode === 'single' ? 'radio' : 'checkbox';
            html += '<div class="picker-class-row" onclick="toggleClassSelection(\'' + cls + '\')">'
              + '<div class="picker-control ' + controlType + (allInClassSelected ? ' on' : '') + '"></div>'
              + '<div style="flex:1;">'
              + '<div class="name">' + cls + ' (整班)</div>'
              + '<div class="meta">' + selectedInClass + '/' + classStudentNos.length + ' 已选 · 班级共 ' + classTotal + ' 人</div>'
              + '</div></div>';
            groups[cls].forEach(s => {
              const isSelected = pickerState.selected.has(s.no);
              html += '<div class="picker-row" onclick="toggleStudentSelection(\'' + s.no + '\')">'
                + '<div class="picker-control ' + controlType + (isSelected ? ' on' : '') + '"></div>'
                + '<div class="avatar">' + s.name.charAt(0) + '</div>'
                + '<div style="flex:1;">'
                + '<div class="name">' + s.name + ' <span class="risk-tag ' + s.risk + '">' + RISK_LABEL[s.risk] + '</span></div>'
                + '<div class="meta">' + s.no + ' · ' + cls + '</div>'
                + '</div></div>';
            });
          });
          list.innerHTML = html;
          document.getElementById('pickerCountText').textContent = pickerState.selected.size > 0 ? '(' + pickerState.selected.size + ')' : '';
        }
        function toggleStudentSelection(no) {
          if (pickerState.mode === 'single') {
            pickerState.selected.clear();
            pickerState.selected.add(no);
          } else {
            if (pickerState.selected.has(no)) pickerState.selected.delete(no);
            else pickerState.selected.add(no);
          }
          renderStudentList();
        }
        function toggleClassSelection(cls) {
          const classStudentNos = STUDENTS.filter(s => s.class === cls).map(s => s.no);
          const allSelected = classStudentNos.every(no => pickerState.selected.has(no));
          if (pickerState.mode === 'single') {
            pickerState.selected.clear();
            pickerState.selected.add('__class:' + cls);
          } else {
            if (allSelected) {
              classStudentNos.forEach(no => pickerState.selected.delete(no));
            } else {
              classStudentNos.forEach(no => pickerState.selected.add(no));
            }
          }
          renderStudentList();
        }
        function confirmStudentPicker() {
          if (pickerState.callback) pickerState.callback(Array.from(pickerState.selected));
          closeStudentPicker();
        }

        /* ====== 表单回调:新建提醒(多选) ====== */
        function onReminderStudentsPicked(selected) {
          const display = document.getElementById('reminderRangeDisplay');
          if (selected.length === 0) {
            display.textContent = '点击选择';
            display.classList.add('placeholder');
            return;
          }
          display.classList.remove('placeholder');
          const classSelections = selected.filter(s => s.startsWith('__class:')).map(s => s.substring(8));
          const classStudents = new Set();
          classSelections.forEach(cls => STUDENTS.filter(s => s.class === cls).forEach(s => classStudents.add(s.no)));
          const explicitStudents = selected.filter(s => !s.startsWith('__class:'));
          explicitStudents.forEach(no => classStudents.add(no));
          if (classSelections.length === 1 && explicitStudents.length === 0) {
            const cls = classSelections[0];
            display.textContent = cls + ' (整班 ' + STUDENTS.filter(s => s.class === cls).length + ' 人)';
          } else if (classSelections.length > 1) {
            display.textContent = classSelections.join(' + ') + ' 共 ' + classStudents.size + ' 人';
          } else {
            display.textContent = '自定义 (' + classStudents.size + ' 人)';
          }
        }
    </script></form>

</body>
</html>
