<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新建日志 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        :root { --color-primary: #1E5AE6; --color-bg-page: #F5F6F8; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
        .phone-shell { width: 375px; height: 812px; background: var(--color-bg-page); border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .status-bar { height: 44px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #000; flex-shrink: 0; line-height: 1; }
        .status-bar iconify-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-size: 16px;
        }
        .nav-bar { height: 44px; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; }
        .template-card { min-width: 100px; height: 120px; background: #fff; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; items-center justify-content: center; text-align: center; border: 2px solid transparent; transition: all 0.2s; }
        .template-card.active { border-color: var(--color-primary); background: #E8F0FE; }
        /* 横向滚动桌面端鼠标增强 */
        .xzd-hscroll { position: relative; }
        .xzd-hscroll .hscroll-area {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            cursor: grab;
        }
        .xzd-hscroll .hscroll-area.dragging { cursor: grabbing; scroll-behavior: auto; }
        .xzd-hscroll .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 28px; height: 28px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #E5E7EB; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            opacity: 0; transition: opacity 0.2s;
            color: #6B7280;
            font-size: 16px;
        }
        .xzd-hscroll:hover .nav-btn,
        .xzd-hscroll .nav-btn:focus { opacity: 1; }
        .xzd-hscroll .nav-btn.left { left: 8px; }
        .xzd-hscroll .nav-btn.right { right: 8px; }
        .xzd-hscroll .nav-btn.hidden { opacity: 0 !important; pointer-events: none; }
        .form-group { background: #fff; border-radius: 16px; margin: 12px 16px; padding: 4px 16px; }
        .input-row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #F3F4F6; last:border-0; }
        .input-row label { width: 80px; font-size: 14px; color: #6B7280; }
        .input-row input, .input-row select { flex: 1; border: 0; outline: none; font-size: 14px; text-align: right; color: #111827; }
        .action-bar { height: 80px; background: #fff; border-top: 1px solid #F3F4F6; display: flex; align-items: center; padding: 0 16px 20px; flex-shrink: 0; }

        /* 学生选择器(底部弹起) */
        .picker-trigger { display: flex; align-items: center; flex: 1; gap: 4px; cursor: pointer; min-width: 0; }
        .picker-trigger .value { flex: 1; text-align: right; font-size: 14px; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .picker-trigger .value.placeholder { color: #9CA3AF; }
        .picker-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; display: none; }
        .picker-mask.show { display: block; }
        .picker-sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 61; background: #fff; border-radius: 16px 16px 0 0; max-height: 80vh; display: none; flex-direction: column; }
        .picker-sheet.show { display: flex; animation: pickerUp 0.25s ease-out; }
        @keyframes pickerUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .picker-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #F0F0F0; flex-shrink: 0; }
        .picker-header .title { font-size: 16px; font-weight: 600; color: #191919; }
        .picker-header .cancel { font-size: 14px; color: #6B7280; cursor: pointer; }
        .picker-search { padding: 12px 16px 4px; flex-shrink: 0; }
        .picker-search input { width: 100%; padding: 10px 12px; background: #F5F5F5; border: 0; border-radius: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
        .picker-filters { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; flex-shrink: 0; }
        .picker-chip { padding: 5px 12px; background: #F5F5F5; color: #444; border-radius: 14px; font-size: 12px; white-space: nowrap; border: 1px solid transparent; cursor: pointer; flex-shrink: 0; }
        .picker-chip.on { background: #EFF6FF; color: #1E5AE6; border-color: #1E5AE6; font-weight: 600; }
        .picker-list { flex: 1; overflow-y: auto; }
        .picker-class-row { display: flex; align-items: center; padding: 12px 16px; background: #F8F9FA; border-top: 1px solid #F0F0F0; gap: 12px; cursor: pointer; }
        .picker-class-row:hover { background: #F0F2F5; }
        .picker-class-row .name { font-size: 14px; font-weight: 600; color: #191919; }
        .picker-class-row .meta { font-size: 11px; color: #888; margin-top: 2px; }
        .picker-row { display: flex; align-items: center; padding: 12px 16px; background: #fff; border-top: 1px solid #F5F5F5; gap: 12px; cursor: pointer; }
        .picker-row:hover { background: #FAFAFA; }
        .picker-row .name { flex: 1; font-size: 14px; color: #191919; display: flex; align-items: center; gap: 6px; }
        .picker-row .meta { font-size: 11px; color: #888; margin-top: 2px; }
        .picker-row .avatar { width: 32px; height: 32px; border-radius: 50%; background: #F0F2F5; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #444; flex-shrink: 0; }
        .picker-control { width: 20px; height: 20px; border: 1.5px solid #D1D5DB; flex-shrink: 0; box-sizing: border-box; }
        .picker-control.radio { border-radius: 50%; }
        .picker-control.checkbox { border-radius: 4px; }
        .picker-control.on { border-color: #1E5AE6; background: #1E5AE6; }
        .picker-control.checkbox.on::after { content: '✓'; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; line-height: 1; }
        .picker-control.radio.on::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; margin: 4px auto; display: block; }
        .picker-empty { text-align: center; padding: 40px 16px; color: #888; font-size: 13px; }
        .picker-footer { padding: 12px 16px 20px; border-top: 1px solid #F0F0F0; display: flex; gap: 10px; flex-shrink: 0; background: #fff; }
        .picker-btn { flex: 1; height: 44px; border-radius: 22px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 0; cursor: pointer; }
        .picker-btn.cancel { background: #F2F3F5; color: #444; }
        .picker-btn.confirm { background: #1E5AE6; color: #fff; }
        .risk-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
        .risk-tag.high { background: #FEF2F2; color: #DC2626; }
        .risk-tag.mid { background: #FFF7E6; color: #FA9D3B; }
        .risk-tag.low { background: #EFF6FF; color: #3B82F6; }
        .risk-tag.none { background: #F5F5F5; color: #888; }
    
        @keyframes toastIn { from { opacity:0; transform:translate(-50%, -10px); } to { opacity:1; transform:translate(-50%, 0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
        .app-toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.78); color:#fff; padding:10px 20px; border-radius:20px; font-size:14px; z-index:9999; animation: toastIn 0.25s ease-out; }
        .app-toast.out { animation: toastOut 0.25s ease-out forwards; }

        /* PR-H+: 创建/修改时间戳(会议要求:工作记录需同时记录创建时间与修改时间) */
        .edit-time-bar { background:#fff; border-radius:16px; margin:12px 16px 0; padding:12px 16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:11px; color:#6B7280; }
        .edit-time-bar .ts { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; background:#F5F6F8; border-radius:8px; }
        .edit-time-bar .ts.created { background:#F5F6F8; color:#444; }
        .edit-time-bar .ts.updated { background:#EFF6FF; color:var(--color-primary); font-weight:600; }
        .edit-time-bar .ts iconify-icon { font-size:13px; }
        .edit-time-bar .ts .label { color:#9CA3AF; margin-right:2px; }
        .edit-time-bar .ts.updated .label { color:var(--color-primary); opacity:0.7; }
        .edit-time-bar .mod-count { margin-left:auto; color:#9CA3AF; }

        .edit-history { background:#fff; border-radius:16px; margin:12px 16px; padding:14px 16px; }
        .edit-history .h-title { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#191919; margin-bottom:10px; }
        .edit-history .h-title iconify-icon { font-size:15px; color:var(--color-primary); }
        .edit-history ul { list-style:none; margin:0; padding:0; max-height:180px; overflow-y:auto; }
        .edit-history li { position:relative; padding:0 0 10px 18px; font-size:11px; color:#444; line-height:1.5; }
        .edit-history li:last-child { padding-bottom:0; }
        .edit-history li::before { content:''; position:absolute; left:5px; top:5px; width:7px; height:7px; border-radius:50%; background:#D1D5DB; border:2px solid #fff; box-shadow:0 0 0 1px #D1D5DB; }
        .edit-history li.created::before { background:var(--color-primary); box-shadow:0 0 0 1px var(--color-primary); }
        .edit-history li.updated::before { background:var(--warning); box-shadow:0 0 0 1px var(--warning); }
        .edit-history li .h-ts { color:#6B7280; font-family:ui-monospace, "SF Mono", monospace; font-size:10px; }
        .edit-history li .h-action { display:inline-block; padding:0 5px; border-radius:3px; font-size:9px; font-weight:600; margin-left:4px; }
        .edit-history li.created .h-action { background:#EFF6FF; color:var(--color-primary); }
        .edit-history li.updated .h-action { background:#FFF7E6; color:#C2700A; }
        .edit-history li .h-summary { color:#191919; margin-top:2px; }
    </style>
</head>

<div class="phone-shell">
<div class="status-bar">
<span>12:20</span>

<script>
        function selectTemplate(el) {
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        // 横向滚动 carousel 通用增强 (nav 箭头 + 滚轮 hijack + 拖拽 + 键盘)
        function initHScroll(wrapper) {
            if (!wrapper) return;
            var scroll = wrapper.querySelector('.hscroll-area');
            var leftBtn = wrapper.querySelector('.nav-btn.left');
            var rightBtn = wrapper.querySelector('.nav-btn.right');
            if (!scroll || !leftBtn || !rightBtn) return;

            // 1. 箭头按钮 + 边界状态
            function updateBtns() {
                leftBtn.classList.toggle('hidden', scroll.scrollLeft <= 1);
                rightBtn.classList.toggle('hidden',
                    scroll.scrollLeft >= scroll.scrollWidth - scroll.clientWidth - 1);
            }
            leftBtn.addEventListener('click', function() {
                scroll.scrollBy({ left: -120, behavior: 'smooth' });
            });
            rightBtn.addEventListener('click', function() {
                scroll.scrollBy({ left: 120, behavior: 'smooth' });
            });
            scroll.addEventListener('scroll', updateBtns, { passive: true });
            updateBtns();

            // 2. 鼠标滚轮: 纵向 → 横向 hijack
            scroll.addEventListener('wheel', function(e) {
                if (e.deltaY === 0) return;
                e.preventDefault();
                scroll.scrollLeft += e.deltaY;
            }, { passive: false });

            // 3. 鼠标拖拽
            var isDown = false, startX = 0, startScroll = 0;
            scroll.addEventListener('mousedown', function(e) {
                isDown = true; startX = e.pageX; startScroll = scroll.scrollLeft;
                scroll.classList.add('dragging');
            });
            ['mouseleave', 'mouseup'].forEach(function(evt) {
                scroll.addEventListener(evt, function() {
                    isDown = false; scroll.classList.remove('dragging');
                });
            });
            scroll.addEventListener('mousemove', function(e) {
                if (!isDown) return;
                e.preventDefault();
                scroll.scrollLeft = startScroll - (e.pageX - startX) * 1.5;
            });

            // 4. 键盘左右箭头 (a11y)
            scroll.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft')  { e.preventDefault(); scroll.scrollBy({ left: -120, behavior: 'smooth' }); }
                if (e.key === 'ArrowRight') { e.preventDefault(); scroll.scrollBy({ left:  120, behavior: 'smooth' }); }
            });
        }

        // 初始化模板选择 carousel
        initHScroll(document.getElementById('tplCarousel'));

        /*
          API Contract (后端实现时按此对接):
          GET /api/me/students?keyword=&class_name=&risk_level=&page=1&size=20
          Response 200: {
            "total": int,
            "students": [
              { "student_no":"string", "student_name":"string", "class_name":"string", "risk_level":"high|mid|low|none" }
            ],
            "classes": [
              { "class_id":"string", "class_name":"string", "count":int }
            ]
          }
        */
        const STUDENTS = [
          { no: '2024001', name: '张三',   class: '计科1班',   risk: 'high' },
          { no: '2024002', name: '李四',   class: '计科1班',   risk: 'none' },
          { no: '2024003', name: '王五',   class: '计科1班',   risk: 'low'  },
          { no: '2024004', name: '赵六',   class: '计科1班',   risk: 'mid'  },
          { no: '2024005', name: '钱七',   class: '计科2班',   risk: 'none' },
          { no: '2024006', name: '孙八',   class: '计科2班',   risk: 'high' },
          { no: '2024007', name: '周九',   class: '计科2班',   risk: 'mid'  },
          { no: '2024008', name: '吴十',   class: '软工1班',   risk: 'none' },
          { no: '2024009', name: '郑十一', class: '软工1班',   risk: 'low'  },
          { no: '2024010', name: '冯十二', class: '软工1班',   risk: 'none' },
          { no: '2024011', name: '陈十三', class: '大数据1班', risk: 'mid'  },
          { no: '2024012', name: '褚十四', class: '大数据1班', risk: 'high' },
          { no: '2024013', name: '卫十五', class: '大数据1班', risk: 'none' }
        ];
        const RISK_LABEL = { high: '红档', mid: '黄档', low: '蓝档', none: '正常' };
        let pickerState = { mode: 'single', selected: new Set(), classFilter: '', riskFilter: '', callback: null };
        function openStudentPicker(mode, preSelected, callback) {
          pickerState.mode = mode;
          pickerState.selected = new Set(preSelected || []);
          pickerState.classFilter = '';
          pickerState.riskFilter = '';
          pickerState.callback = callback;
          document.getElementById('pickerTitle').textContent = mode === 'single' ? '选择学生' : '选择学生(多选)';
          document.getElementById('pickerSearch').value = '';
          document.querySelectorAll('#pickerClassFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.c === ''));
          document.querySelectorAll('#pickerRiskFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.r === ''));
          document.getElementById('pickerMask').classList.add('show');
          document.getElementById('pickerSheet').classList.add('show');
          renderStudentList();
        }
        function closeStudentPicker() {
          document.getElementById('pickerMask').classList.remove('show');
          document.getElementById('pickerSheet').classList.remove('show');
        }
        function setClassFilter(c) {
          pickerState.classFilter = c;
          document.querySelectorAll('#pickerClassFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.c === c));
          renderStudentList();
        }
        function setRiskFilter(r) {
          pickerState.riskFilter = r;
          document.querySelectorAll('#pickerRiskFilter .picker-chip').forEach(el => el.classList.toggle('on', el.dataset.r === r));
          renderStudentList();
        }
        function renderStudentList() {
          const search = document.getElementById('pickerSearch').value.trim().toLowerCase();
          const filtered = STUDENTS.filter(s => {
            if (pickerState.classFilter && s.class !== pickerState.classFilter) return false;
            if (pickerState.riskFilter && s.risk !== pickerState.riskFilter) return false;
            if (search && !(s.name.toLowerCase().includes(search) || s.no.includes(search))) return false;
            return true;
          });
          const list = document.getElementById('pickerList');
          if (filtered.length === 0) {
            list.innerHTML = '<div class="picker-empty">未找到匹配的学生</div>';
            document.getElementById('pickerCountText').textContent = '';
            return;
          }
          const groups = {};
          filtered.forEach(s => { if (!groups[s.class]) groups[s.class] = []; groups[s.class].push(s); });
          let html = '';
          Object.keys(groups).forEach(cls => {
            const classTotal = STUDENTS.filter(s => s.class === cls).length;
            const classStudentNos = STUDENTS.filter(s => s.class === cls).map(s => s.no);
            const selectedInClass = classStudentNos.filter(no => pickerState.selected.has(no)).length;
            const allInClassSelected = selectedInClass === classStudentNos.length;
            const controlType = pickerState.mode === 'single' ? 'radio' : 'checkbox';
            html += '<div class="picker-class-row" onclick="toggleClassSelection(\'' + cls + '\')">'
              + '<div class="picker-control ' + controlType + (allInClassSelected ? ' on' : '') + '"></div>'
              + '<div style="flex:1;">'
              + '<div class="name">' + cls + ' (整班)</div>'
              + '<div class="meta">' + selectedInClass + '/' + classStudentNos.length + ' 已选 · 班级共 ' + classTotal + ' 人</div>'
              + '</div></div>';
            groups[cls].forEach(s => {
              const isSelected = pickerState.selected.has(s.no);
              html += '<div class="picker-row" onclick="toggleStudentSelection(\'' + s.no + '\')">'
                + '<div class="picker-control ' + controlType + (isSelected ? ' on' : '') + '"></div>'
                + '<div class="avatar">' + s.name.charAt(0) + '</div>'
                + '<div style="flex:1;">'
                + '<div class="name">' + s.name + ' <span class="risk-tag ' + s.risk + '">' + RISK_LABEL[s.risk] + '</span></div>'
                + '<div class="meta">' + s.no + ' · ' + cls + '</div>'
                + '</div></div>';
            });
          });
          list.innerHTML = html;
          document.getElementById('pickerCountText').textContent = pickerState.selected.size > 0 ? '(' + pickerState.selected.size + ')' : '';
        }
        function toggleStudentSelection(no) {
          if (pickerState.mode === 'single') {
            pickerState.selected.clear();
            pickerState.selected.add(no);
          } else {
            if (pickerState.selected.has(no)) pickerState.selected.delete(no);
            else pickerState.selected.add(no);
          }
          renderStudentList();
        }
        function toggleClassSelection(cls) {
          const classStudentNos = STUDENTS.filter(s => s.class === cls).map(s => s.no);
          const allSelected = classStudentNos.every(no => pickerState.selected.has(no));
          if (pickerState.mode === 'single') {
            pickerState.selected.clear();
            pickerState.selected.add('__class:' + cls);
          } else {
            if (allSelected) {
              classStudentNos.forEach(no => pickerState.selected.delete(no));
            } else {
              classStudentNos.forEach(no => pickerState.selected.add(no));
            }
          }
          renderStudentList();
        }
        function confirmStudentPicker() {
          if (pickerState.callback) pickerState.callback(Array.from(pickerState.selected));
          closeStudentPicker();
        }

        /* ====== 表单回调:写日志(多选模式) ====== */
        function onLogStudentPicked(selected) {
          const display = document.getElementById('logStudentDisplay');
          if (selected.length === 0) {
            display.textContent = '点击选择（多选，支持整班）';
            display.classList.add('placeholder');
            return;
          }
          display.classList.remove('placeholder');
          const classSelections = selected.filter(s => s.startsWith('__class:')).map(s => s.substring(8));
          const classStudents = new Set();
          classSelections.forEach(cls => STUDENTS.filter(s => s.class === cls).forEach(s => classStudents.add(s.no)));
          const explicitStudents = selected.filter(s => !s.startsWith('__class:'));
          explicitStudents.forEach(no => classStudents.add(no));
          if (classSelections.length === 1 && explicitStudents.length === 0) {
            const cls = classSelections[0];
            display.textContent = cls + ' (整班 ' + STUDENTS.filter(s => s.class === cls).length + ' 人)';
          } else if (classSelections.length > 1) {
            display.textContent = classSelections.join(' + ') + ' 共 ' + classStudents.size + ' 人';
          } else if (explicitStudents.length === 1) {
            const s = STUDENTS.find(x => x.no === explicitStudents[0]);
            display.textContent = s ? s.name : explicitStudents[0];
          } else {
            display.textContent = '自定义 (' + classStudents.size + ' 人)';
          }
        }
    </script>

<script>
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'app-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 250); }, 1500);
}

/* PR-H+: 格式化当前时间为 'YYYY-MM-DD HH:mm' */
function nowTs() {
  var d = new Date();
  var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
    + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

/* PR-H+: 把当前编辑结果写回 localStorage 中的对应日志,
   追加历史时间戳(支持不限次数修改) */
function persistLogUpdate(actionLabel) {
  var editing = window.__editingLog;
  if (!editing) return;
  var logs = [];
  try { logs = JSON.parse(localStorage.getItem('xzd_logs') || '[]'); } catch(e) { logs = []; }
  var idx = logs.findIndex(function(x) { return x.log_id === editing.log_id; });
  if (idx < 0) return;
  var now = nowTs();
  var newHistory = Array.isArray(editing.history) ? editing.history.slice() : [];
  newHistory.push({ ts: now, action: 'updated', summary: actionLabel || '更新日志内容' });
  var updated = Object.assign({}, editing, {
    body: document.getElementById('logContent').value,
    time: (document.getElementById('logDate').value || '') + ' ' + now.substring(11),
    place: document.getElementById('logPlace').value,
    updated_at: now,
    history: newHistory
  });
  logs[idx] = updated;
  try { localStorage.setItem('xzd_logs', JSON.stringify(logs)); } catch(e) {}
  window.__editingLog = updated;
}

function saveDraft() {
  /* PR-H+: 编辑草稿时同样记录修改 */
  if (window.__editingLog) persistLogUpdate('保存草稿(修改内容)');
  showToast('保存草稿成功');
}
function submitLog() {
  /* PR-H+: 编辑提交时记录新时间戳 */
  if (window.__editingLog) persistLogUpdate('更新日志内容');
  showToast(window.__editingLog ? '日志已更新(已记录修改时间戳)' : '日志已提交（演示）');
  /* PR-H.2: 保留来源参数 (student/cat/from/dorm) */
  var sp = new URLSearchParams(window.location.search);
  var keep = ['student','cat','from','dorm'];
  var parts = [];
  keep.forEach(function(k){var v=sp.get(k); if(v!=null&&v!=='') parts.push(k+'='+encodeURIComponent(v));});
  var target = 'counselor_logs.html' + (parts.length ? '?' + parts.join('&') : '');
  setTimeout(function() { window.location.href = target; }, 800);
}
function onFilesPicked(input) {
  var preview = document.getElementById('attachPreview');
  preview.innerHTML = '';
  var files = Array.from(input.files || []);
  files.forEach(function(f) {
    var url = URL.createObjectURL(f);
    var img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid #E5E7EB;';
    preview.appendChild(img);
  });
  if (files.length > 0) showToast('已添加 ' + files.length + ' 张图片（演示，未上传）');
}

// ?lid= 回填(从 localStorage 读取,需要 counselor_logs.html 先写入)
window.__editingLog = null;
(function() {
  var lid = new URLSearchParams(window.location.search).get('lid');
  if (!lid) return;
  var logs = [];
  try { logs = JSON.parse(localStorage.getItem('xzd_logs') || '[]'); } catch(e) {}
  var log = logs.find(function(x) { return x.log_id === lid; });
  if (!log) { showToast('未找到日志 ' + lid + '（请先访问工作日志页）'); return; }
  window.__editingLog = log;
  document.getElementById('logDate').value = (log.time || '').split(' ')[0];
  document.getElementById('logPlace').value = log.place || '';
  document.getElementById('logContent').value = log.body || '';
  var display = document.getElementById('logStudentDisplay');
  display.textContent = log.linked_student || '点击选择（多选，支持整班）';
  display.classList.remove('placeholder');
  var submitBtn = document.getElementById('submitBtn');
  if (submitBtn) submitBtn.textContent = '更新日志';
  var catMap = { 'c1':'谈心谈话', 'c2':'进宿舍', 'c3':'进课堂', 'c4':'组织班会', 'c5':'班干会议' };
  document.querySelectorAll('.template-card').forEach(function(c) {
    var lbl = c.querySelector('span') ? c.querySelector('span').textContent : '';
    if (lbl === catMap[log.category]) c.classList.add('active');
    else c.classList.remove('active');
  });

  /* PR-H+: 渲染创建/修改时间戳 + 修改历史 */
  var created = log.created_at || log.time || '';
  var updated = log.updated_at || created;
  var history = log.history || [];
  var bar = document.getElementById('editTimeBar');
  if (bar) {
    bar.style.display = 'flex';
    document.getElementById('tsCreatedVal').textContent = created || '—';
    var updatedEl = document.getElementById('tsUpdated');
    if (updated && updated !== created) {
      document.getElementById('tsUpdatedVal').textContent = updated;
      updatedEl.style.display = 'inline-flex';
    } else {
      updatedEl.style.display = 'none';
    }
    var modCount = history.filter(function(h){ return h.action === 'updated'; }).length;
    var mc = document.getElementById('modCount');
    if (mc) mc.textContent = modCount > 0 ? ('已修改 ' + modCount + ' 次') : '尚未修改';
  }
  var histBox = document.getElementById('editHistory');
  var histList = document.getElementById('editHistoryList');
  if (histBox && histList) {
    if (history.length > 0) {
      histBox.style.display = 'block';
      document.getElementById('editHistoryTitle').textContent = '修改历史(共 ' + history.length + ' 条)';
      var hh = '';
      history.forEach(function(h) {
        var actionLabel = h.action === 'created' ? '创建' : '修改';
        hh += '<li class="' + h.action + '">'
          + '<span class="h-ts">' + h.ts + '</span>'
          + '<span class="h-action">' + actionLabel + '</span>'
          + '<div class="h-summary">' + (h.summary || '') + '</div>'
          + '</li>';
      });
      histList.innerHTML = hh;
    } else {
      histBox.style.display = 'block';
      document.getElementById('editHistoryTitle').textContent = '修改历史';
      histList.innerHTML = '<li style="color:#9CA3AF;text-align:center;padding:12px 0;">暂无修改记录</li>';
    }
  }

  showToast('已加载日志 ' + lid);
})();

<script>
/* PR-H.3 v3: nav-back 智能返回 — 优先 referrer, 其次当前 URL */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    /* referrer: 如果 referrer 是同源 counselor_*.html, 用它作为回退目标 */
    var refBase = null, refParts = [];
    if (document.referrer) {
      try {
        var refUrl = new URL(document.referrer);
        var refName = refUrl.pathname.substring(refUrl.pathname.lastIndexOf('/') + 1);
        if (refName.indexOf('counselor_') === 0 && refName.indexOf('.html') !== -1) {
          refBase = refName;
          var refSp = new URLSearchParams(refUrl.search);
          K.forEach(function(k){var v=refSp.get(k); if(v!=null && v!=='') refParts.push(k+'='+encodeURIComponent(v));});
        }
      } catch(e) {}
    }
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back, .nav-bar a[href^="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      var useParts = parts.length ? parts : refParts;
      if (!useParts.length) return;
      /* 如果 referrer 可用, 用 referrer 作为基础; 否则保留原 base */
      var finalBase = refBase || base;
      a.setAttribute('href', finalBase + '?' + useParts.join('&'));
    });
  } catch(e) { console.error('PR-H.3 v3 nav-back error:', e); }
})();
</script>
<script>
/* PR-H.3 v3+: forward 链 (子页链接携带父级参数) */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    if (!parts.length) return;
    var joinTo = function(baseHref){
      var qIdx = baseHref.indexOf('?');
      return qIdx === -1 ? baseHref + '?' + parts.join('&') : baseHref + '&' + parts.join('&');
    };
    document.querySelectorAll('a[href*="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('nav-back') || a.classList.contains('p-2')) return;
      var m = h.match(/^(counselor_[^?#]+)/);
      if (!m) return;
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      a.setAttribute('href', joinTo(h));
    });
  } catch(e) { console.error('PR-H.3 forward error:', e); }
})();
</script>
