<!DOCTYPE html>
<!--
  API Contract:
  POST /api/me/custom-modules/{module_id}/records
  Request: { "content_html":"string", "image_urls":["string"], "visibility":"string" }
  Response 201: { "record_id":"string" }
  PUT /api/me/custom-modules/{module_id}/records/{record_id}
  Request: { "content_html":"string", "visibility":"string" }
  Response 200: { "record_id":"string", "updated_at":"ISO-8601" }
  GET /api/me/custom-modules/{module_id}/records/{record_id}  // 编辑模式拉取
  Response 200: { "record_id":"string", "content_html":"string", "image_urls":["string"], "visibility":"string" }
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新建记录 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --success:#07C160; --warning:#FA9D3B; --bg-page:#F7F7F7; --bg-card:#FFFFFF; --divider:#F0F0F0; --text-primary:#191919; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding-bottom:80px; }

.module-banner { margin:16px 16px 12px; padding:12px 14px; background:linear-gradient(135deg,#EEF2FF 0%,#F5F3FF 100%); border-radius:10px; display:flex; align-items:center; gap:10px; }
.module-banner .icon { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#818CF8,#6366F1); color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.module-banner .info { flex:1; min-width:0; }
.module-banner .label { font-size:10px; color:#6366F1; font-weight:600; }
.module-banner .name { font-size:14px; color:#1E1B4B; font-weight:600; margin-top:2px; }

.editor-card { background:#fff; margin:0 16px 12px; border-radius:12px; overflow:hidden; }
.editor-card .toolbar { display:flex; gap:4px; padding:8px 12px; border-bottom:1px solid var(--divider); }
.editor-card .toolbar span { width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#6B7280; cursor:pointer; }
.editor-card .toolbar span:hover { background:#F5F5F5; color:var(--color-primary); }
.editor-card .toolbar span.on { background:#EFF6FF; color:var(--color-primary); }
.editor-card textarea { width:100%; min-height:200px; padding:14px 16px; border:0; outline:none; font-size:14px; line-height:1.7; resize:none; box-sizing:border-box; font-family:inherit; color:var(--text-primary); }
.editor-card .meta { padding:8px 14px; font-size:11px; color:var(--text-secondary); border-top:1px solid var(--divider); display:flex; justify-content:space-between; }

.attachment { background:#fff; margin:0 16px 12px; padding:14px; border-radius:12px; }
.attachment .h { font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.attachment .count { font-size:11px; color:var(--text-secondary); font-weight:400; }
.attachment .imgs { display:flex; gap:8px; flex-wrap:wrap; }
.attachment .imgs .img { width:72px; height:72px; border-radius:8px; background:linear-gradient(135deg,#A5B4FC,#818CF8); position:relative; }
.attachment .imgs .add { width:72px; height:72px; border:2px dashed #D1D5DB; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#9CA3AF; font-size:24px; }

.vis-card { background:#fff; margin:0 16px 12px; padding:14px; border-radius:12px; }
.vis-card .h { font-size:13px; font-weight:600; color:var(--text-primary); margin-bottom:10px; }
.vis-card .opt { display:flex; gap:8px; }
.vis-card .opt span { flex:1; padding:10px 0; text-align:center; border:1.5px solid #E5E7EB; border-radius:8px; font-size:13px; color:#444; }
.vis-card .opt span.on { border-color:var(--color-primary); color:var(--color-primary); background:#EFF6FF; font-weight:600; }
.vis-card .sub { font-size:11px; color:var(--text-secondary); margin-top:6px; }

.action-bar { background:#fff; padding:12px 16px 20px; display:flex; gap:10px; position:absolute; bottom:0; left:0; right:0; border-top:1px solid var(--divider); }
.action-bar button { flex:1; height:44px; border-radius:22px; font-size:15px; font-weight:600; border:0; cursor:pointer; }
.action-bar .cancel { background:#F2F3F5; color:#444; }
.action-bar .save { background:var(--color-primary); color:#fff; }

.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
<body>
<div class="phone-shell">
<div class="status-bar">
  <span>12:20</span>
  <div class="flex gap-1.5 text-[#000]">
    <iconify-icon icon="mingcute:signal-fill"></iconify-icon>
    <iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
    <iconify-icon icon="mingcute:battery-fill"></iconify-icon>
  </div>
</div>
<div class="nav-bar">
  <a class="p-2 -ml-2" href="counselor_custom_module_records.html"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
  <h1 class="flex-1 text-center text-base font-bold text-gray-900" id="pageTitle">新建记录</h1>
  <span class="p-2 -mr-2 w-8"></span>
</div>

<div class="content">
<form id="xzdForm" onsubmit="event.preventDefault();" novalidate autocomplete="on">
  <!-- 模块标识 -->
  <div class="module-banner">
    <div class="icon"><iconify-icon icon="solar:diploma-bold"></iconify-icon></div>
    <div class="info">
      <div class="label">记录到模块</div>
      <div class="name" id="moduleName">我今天的工作心得</div>
    </div>
  </div>

  <!-- 富文本编辑器 -->
  <div class="editor-card">
    <div class="toolbar">
      <span title="加粗" onclick="wrapText('**')"><iconify-icon icon="solar:text-bold-bold"></iconify-icon></span>
      <span title="斜体" onclick="wrapText('*')"><iconify-icon icon="solar:text-italic-bold"></iconify-icon></span>
      <span title="列表" onclick="insertLine('- ')"><iconify-icon icon="solar:list-bold"></iconify-icon></span>
      <span title="引用" onclick="insertLine('> ')"><iconify-icon icon="solar:quote-up-bold"></iconify-icon></span>
      <span title="代码" onclick="wrapText('`')"><iconify-icon icon="solar:code-bold"></iconify-icon></span>
      <span title="图片"><iconify-icon icon="solar:gallery-bold"></iconify-icon></span>
    </div>
    <textarea id="recordContent" placeholder="记录此刻的想法、反思、观察……"></textarea>
    <div class="meta">
      <span id="charCount">0 字</span>
      <span>支持富文本(简化 Markdown)</span>
    </div>
  </div>

  <!-- 图片附件 -->
  <div class="attachment">
    <div class="h">
      图片附件 <span class="count" id="imgCount">0/9</span>
    </div>
    <div class="imgs">
      <div class="img"></div>
      <div class="img"></div>
      <div class="add"><iconify-icon icon="solar:add-linear"></iconify-icon></div>
    </div>
  </div>

  <!-- 可见性 -->
  <div class="vis-card">
    <div class="h">可见性</div>
    <div class="opt">
      <span class="on" data-vis="private" onclick="setVis('private')">仅自己</span>
      <span data-vis="shared" onclick="setVis('shared')">授权书记查看</span>
    </div>
    <div class="sub" id="visHint">关闭后,该记录仅本人可见</div>
  </div>
</div>

<div class="action-bar">
  <button class="cancel" onclick="window.history.back()">取消</button>
  <button class="save" onclick="saveRecord()">保存记录</button>
</div></form>

<div class="home-indicator"><div class="bar"></div></div>
</div>

<script>
var MODE = 'new';
var CURRENT_MID = 'M001';
(function() {
  var p = new URLSearchParams(window.location.search);
  if (p.get('mid')) CURRENT_MID = p.get('mid');
  if (p.get('rid')) MODE = 'edit';
  var moduleNames = {
    'M001': '我今天的工作心得',
    'M002': '班会反思',
    'M003': '重点学生观察'
  };
  document.getElementById('moduleName').textContent = moduleNames[CURRENT_MID] || '自定义模块';
  if (MODE === 'edit') {
    document.getElementById('pageTitle').textContent = '编辑记录';
    document.getElementById('recordContent').value = '今天和王五谈了一个小时,主要聊他最近和室友关系紧张的问题。他愿意主动找辅导员说明情况,说明信任度提升了。\n\n- 明天跟进室友那边\n- 持续观察';
  }
})();
function wrapText(ch) {
  var t = document.getElementById('recordContent');
  var s = t.selectionStart, e = t.selectionEnd;
  var v = t.value;
  t.value = v.substring(0, s) + ch + v.substring(s, e) + ch + v.substring(e);
  updateCount();
}
function insertLine(prefix) {
  var t = document.getElementById('recordContent');
  var s = t.selectionStart;
  var v = t.value;
  t.value = v.substring(0, s) + '\n' + prefix + v.substring(s);
  updateCount();
}
function updateCount() {
  var t = document.getElementById('recordContent').value;
  document.getElementById('charCount').textContent = t.length + ' 字';
}
document.getElementById('recordContent').addEventListener('input', updateCount);
function setVis(v) {
  document.querySelectorAll('.vis-card .opt span').forEach(function(el) {
    el.classList.toggle('on', el.dataset.vis === v);
  });
  document.getElementById('visHint').textContent = v === 'shared'
    ? '学工书记可在管理端看到本记录(用于评估和经验推广)'
    : '关闭后,该记录仅本人可见';
}
function saveRecord() {
  var content = document.getElementById('recordContent').value.trim();
  if (!content) { alert('请输入记录内容'); return; }
  alert((MODE === 'edit' ? '已更新' : '已新建') + '记录(' + content.length + ' 字)(演示,数据未持久化)');
  window.location.href = 'counselor_custom_module_records.html?mid=' + CURRENT_MID;
}
</script>
</body>
</html>
