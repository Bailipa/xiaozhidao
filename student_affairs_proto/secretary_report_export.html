<!DOCTYPE html>
<!--
  API Contract:
  GET /api/admin/reports
  Response 200: {
    "report_types": [
      { "code":"anomaly_monthly", "name":"异常月报", "description":"string" },
      { "code":"late_return_weekly", "name":"晚归周报", "description":"string" },
      { "code":"class_ranking", "name":"班级排行", "description":"string" }
    ],
    "formats": ["xlsx", "pdf"],
    "history": [
      { "export_id":"string", "type":"string", "period":"string", "format":"string", "size_kb":int, "exported_at":"ISO-8601", "exported_by":"string", "download_url":"string" }
    ]
  }
  POST /api/admin/reports/export
  Request: { "type":"string", "period":{ "start":"YYYY-MM-DD","end":"YYYY-MM-DD" }, "format":"xlsx|pdf" }
  Response 200: { "export_id":"string", "download_url":"string" }
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>数据报表导出 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --success:#07C160; --bg-page:#F7F7F7; --bg-card:#FFFFFF; --divider:#F0F0F0; --text-primary:#191919; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding-bottom:80px; }
.section-h { padding:14px 20px 6px; font-size:12px; color:var(--text-secondary); font-weight:600; }
.card { background:#fff; margin:0 16px 12px; border-radius:12px; overflow:hidden; }
.type-cell { display:flex; align-items:center; padding:14px 16px; gap:12px; }
.type-cell + .type-cell { border-top:1px solid var(--divider); }
.type-cell .icon { width:40px; height:40px; border-radius:10px; background:#EEF2FF; color:var(--color-primary); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.type-cell .info { flex:1; min-width:0; }
.type-cell .name { font-size:14px; font-weight:600; color:var(--text-primary); }
.type-cell .desc { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.type-cell .radio { width:20px; height:20px; border:2px solid #D1D5DB; border-radius:50%; flex-shrink:0; }
.type-cell.selected .radio { border-color:var(--color-primary); background:var(--color-primary); box-shadow:inset 0 0 0 3px #fff; }
.date-cell { display:flex; align-items:center; padding:14px 16px; gap:12px; }
.date-cell + .date-cell { border-top:1px solid var(--divider); }
.date-cell .k { font-size:14px; color:var(--text-primary); flex:1; }
.date-cell .v { font-size:13px; color:var(--text-secondary); }
.date-cell .arrow { color:#C0C4CC; font-size:16px; }
.seg { display:flex; background:#F2F3F5; border-radius:8px; padding:2px; }
.seg span { flex:1; text-align:center; font-size:12px; padding:6px 0; border-radius:6px; color:var(--text-secondary); }
.seg span.on { background:#fff; color:var(--color-primary); font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,0.06); }
.history-item { display:flex; align-items:center; padding:12px 16px; gap:12px; }
.history-item + .history-item { border-top:1px solid var(--divider); }
.history-item .file-icon { width:36px; height:36px; border-radius:8px; background:#ECFDF5; color:var(--success); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.history-item .info { flex:1; min-width:0; }
.history-item .name { font-size:13px; color:var(--text-primary); font-weight:500; }
.history-item .meta { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.history-item .dl { font-size:12px; color:var(--color-primary); padding:4px 8px; flex-shrink:0; }
.action-bar { background:#fff; padding:12px 16px 20px; display:flex; gap:12px; position:absolute; bottom:0; left:0; right:0; border-top:1px solid var(--divider); }
.btn { flex:1; height:44px; border-radius:22px; font-size:15px; font-weight:600; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; }
.btn.primary { background:var(--color-primary); color:#fff; }
.btn.secondary { background:#F2F3F5; color:#444; }
.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
<body>
<div class="phone-shell">
<script type="application/json" id="page-data">
{
  "selected_type": "anomaly_monthly",
  "selected_format": "xlsx",
  "period": { "start": "2026-06-01", "end": "2026-06-30" },
  "history": [
    { "export_id":"E2026063001", "type":"异常月报", "period":"2026-05", "format":"xlsx", "size_kb":128, "exported_at":"2026-06-01T09:00:00+08:00", "exported_by":"刘书记", "download_url":"/files/reports/E2026063001.xlsx" },
    { "export_id":"E2026061502", "type":"晚归周报", "period":"2026-W22", "format":"pdf", "size_kb":56, "exported_at":"2026-06-08T10:30:00+08:00", "exported_by":"刘书记", "download_url":"/files/reports/E2026061502.pdf" },
    { "export_id":"E2026060103", "type":"班级排行", "period":"2026-05", "format":"xlsx", "size_kb":42, "exported_at":"2026-06-01T09:15:00+08:00", "exported_by":"刘书记", "download_url":"/files/reports/E2026060103.xlsx" }
  ]
}
</script>
<div class="status-bar">
  <span>12:20</span>
  <div class="flex gap-1.5 text-[#000]">
    <iconify-icon icon="mingcute:signal-fill"></iconify-icon>
    <iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
    <iconify-icon icon="mingcute:battery-fill"></iconify-icon>
  </div>
</div>
<div class="nav-bar">
  <a class="p-2 -ml-2" href="secretary_profile.html" aria-label="我的"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
  <h1 class="flex-1 text-center text-base font-bold text-gray-900">报表导出</h1>
  <span class="p-2 -mr-2 w-8"></span>
</div>
<div class="content">
  <div class="section-h">选择报表类型</div>
  <div class="card">
    <div class="type-cell selected" data-code="anomaly_monthly" onclick="pickType(this)">
      <div class="icon"><iconify-icon icon="solar:chart-2-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">异常月报</div>
        <div class="desc">学生异常情况按月汇总,含分布、跟进状态、风险等级</div>
      </div>
      <div class="radio"></div>
    </div>
    <div class="type-cell" data-code="late_return_weekly" onclick="pickType(this)">
      <div class="icon"><iconify-icon icon="solar:login-3-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">晚归周报</div>
        <div class="desc">门禁晚归数据按周统计,含人次、班级 TOP、时段分布</div>
      </div>
      <div class="radio"></div>
    </div>
    <div class="type-cell" data-code="class_ranking" onclick="pickType(this)">
      <div class="icon"><iconify-icon icon="solar:ranking-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">班级排行</div>
        <div class="desc">各班级辅导员工作数据、异常率、跟进及时性</div>
      </div>
      <div class="radio"></div>
    </div>
  </div>

  <div class="section-h">时间范围</div>
  <div class="card">
    <div class="date-cell">
      <span class="k">起始日期</span>
      <input id="startDate" type="date" class="v" style="border:0;outline:none;background:transparent;color:var(--text-secondary);font-size:13px;text-align:right;" value="2026-06-01"/>
    </div>
    <div class="date-cell">
      <span class="k">结束日期</span>
      <input id="endDate" type="date" class="v" style="border:0;outline:none;background:transparent;color:var(--text-secondary);font-size:13px;text-align:right;" value="2026-06-30"/>
    </div>
  </div>

  <div class="section-h">导出格式</div>
  <div class="card" style="padding:12px 16px;">
    <div class="seg" id="fmtSeg">
      <span class="on" data-fmt="xlsx" onclick="pickFmt(this)">Excel (.xlsx)</span>
      <span data-fmt="pdf" onclick="pickFmt(this)">PDF</span>
    </div>
  </div>

  <div class="section-h">历史导出 (3)</div>
  <div class="card">
    <a class="history-item" href="javascript:void(0);" onclick="onDownload(this)" data-id="E2026063001" data-name="异常月报_2026-05.xlsx">
      <div class="file-icon"><iconify-icon icon="solar:file-text-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">异常月报_2026-05.xlsx</div>
        <div class="meta">128 KB · 6/1 09:00 · 刘书记</div>
      </div>
      <span class="dl">下载</span>
    </a>
    <a class="history-item" href="javascript:void(0);" onclick="onDownload(this)" data-id="E2026061502" data-name="晚归周报_2026W22.pdf">
      <div class="file-icon" style="background:#FEE2E2;color:#DC2626;"><iconify-icon icon="solar:file-pdf-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">晚归周报_2026W22.pdf</div>
        <div class="meta">56 KB · 6/8 10:30 · 刘书记</div>
      </div>
      <span class="dl">下载</span>
    </a>
    <a class="history-item" href="javascript:void(0);" onclick="onDownload(this)" data-id="E2026060103" data-name="班级排行_2026-05.xlsx">
      <div class="file-icon"><iconify-icon icon="solar:file-text-bold"></iconify-icon></div>
      <div class="info">
        <div class="name">班级排行_2026-05.xlsx</div>
        <div class="meta">42 KB · 6/1 09:15 · 刘书记</div>
      </div>
      <span class="dl">下载</span>
    </a>
  </div>
</div>
<div class="action-bar">
  <button class="btn secondary" onclick="onPreview()">预览</button>
  <button class="btn primary" onclick="onExportNow()">立即导出</button>
</div>
<div class="home-indicator"><div class="bar"></div></div>
</div>
<script>
function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:99;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 1500);
}
function pickType(el) {
  document.querySelectorAll('.type-cell').forEach(function(c){ c.classList.remove('selected'); });
  el.classList.add('selected');
  showToast('已选择:' + (el.querySelector('.name').textContent || ''));
}
function pickFmt(el) {
  document.querySelectorAll('#fmtSeg span').forEach(function(s){ s.classList.remove('on'); });
  el.classList.add('on');
}
function onDownload(el) {
  showToast('已开始下载 ' + (el.dataset.name || el.querySelector('.name').textContent));
}
function onPreview() {
  var sel = document.querySelector('.type-cell.selected');
  var name = sel ? sel.querySelector('.name').textContent : '';
  showToast('预览报表:' + name);
}
function onExportNow() {
  var sel = document.querySelector('.type-cell.selected');
  var fmt = (document.querySelector('#fmtSeg .on') || {}).dataset || {};
  var start = document.getElementById('startDate').value;
  var end = document.getElementById('endDate').value;
  var name = sel ? sel.querySelector('.name').textContent : '';
  showToast('已导出 ' + name + ' (' + (fmt.fmt || 'xlsx').toUpperCase() + ') · ' + start + ' ~ ' + end);
  try { localStorage.setItem('xzd_last_export', JSON.stringify({ name:name, fmt:fmt.fmt, start:start, end:end, ts: Date.now() })); } catch(e) {}
}
(function init(){
  try {
    var last = JSON.parse(localStorage.getItem('xzd_last_export') || 'null');
    if (last && last.start) document.getElementById('startDate').value = last.start;
    if (last && last.end) document.getElementById('endDate').value = last.end;
    if (last && last.fmt) {
      var s = document.querySelector('#fmtSeg span[data-fmt="' + last.fmt + '"]');
      if (s) pickFmt(s);
    }
  } catch(e) {}
})();
</script>
<script>
/* PR-H.4: nav-back 用 history.back() 替代 referrer (兼容 file:// + http:// + https://) */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      if (history.length > 1) {
        a.setAttribute('href', 'javascript:history.back()');
        return;
      }
      if (parts.length) {
        a.setAttribute('href', base + '?' + parts.join('&'));
      }
    });
  } catch(e) { console.error('PR-H.4 nav-back error:', e); }
})();
</script></body>
</html>
