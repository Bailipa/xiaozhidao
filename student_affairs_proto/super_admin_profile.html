<script>
function confirmLogout() {
  var m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:flex;align-items:center;justify-content:center;padding:0 32px;';
  m.innerHTML = '<div style="background:#fff;border-radius:14px;width:100%;overflow:hidden;">'
    + '<div style="padding:24px 20px;text-align:center;">'
    + '<iconify-icon style="font-size:32px;color:#DC2626;" icon="solar:logout-bold-duotone"></iconify-icon>'
    + '<div style="font-size:16px;font-weight:700;color:#191919;margin-top:10px;">确认退出登录?</div>'
    + '<div style="font-size:12px;color:#888;margin-top:6px;line-height:1.6;">退出后需重新输入账号密码登录,本次操作将记入审计日志。</div>'
    + '</div>'
    + '<div style="display:flex;border-top:1px solid #F0F0F0;">'
    + '<button data-cancel style="flex:1;height:48px;background:#fff;color:#888;font-size:15px;border:none;border-right:1px solid #F0F0F0;cursor:pointer;">取消</button>'
    + '<button data-ok style="flex:1;height:48px;background:#fff;color:#DC2626;font-size:15px;font-weight:600;border:none;cursor:pointer;">确认退出</button>'
    + '</div></div>';
  document.body.appendChild(m);
  m.querySelector('[data-cancel]').onclick = function() { m.remove(); };
  m.querySelector('[data-ok]').onclick = function() {
    m.remove();
    window.location.href = 'login.html';
  };
}
</script>
