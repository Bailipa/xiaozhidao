<style>
:root { --color-primary:#1E5AE6; --success:#07C160; --warning:#FA9D3B; --danger:#FA5151; --bg-page:#F7F7F7; --bg-card:#FFFFFF; --divider:#F0F0F0; --text-primary:#191919; --text-regular:#444; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; }
.section-h { padding:16px 20px 6px; font-size:12px; color:var(--text-secondary); font-weight:600; }
.card { background:#fff; margin:0 16px 12px; border-radius:12px; overflow:hidden; }
.cell { display:flex; align-items:center; padding:14px 16px; gap:12px; }
.cell + .cell { border-top:1px solid var(--divider); }
.cell .k { font-size:14px; color:var(--text-primary); flex:1; }
.cell .v { font-size:13px; color:var(--text-secondary); }
.cell .v.mono { font-family:ui-monospace,"SF Mono",monospace; }
.cell .arrow { color:#C0C4CC; font-size:16px; }
.cell.action .k { color:var(--color-primary); font-weight:500; }
.device-cell { padding:14px 16px; display:flex; align-items:center; gap:12px; }
.device-cell + .device-cell { border-top:1px solid var(--divider); }
.device-cell .icon { width:36px; height:36px; border-radius:8px; background:#F0F2F5; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.device-cell .info { flex:1; min-width:0; }
.device-cell .name { font-size:14px; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:6px; }
.device-cell .name .current { font-size:10px; padding:1px 6px; background:#07C160; color:#fff; border-radius:4px; }
.device-cell .sub { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.device-cell .logout { font-size:12px; color:var(--danger); padding:4px 8px; flex-shrink:0; }
.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
</style>
</head>
