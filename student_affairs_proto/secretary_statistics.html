<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>统计看板 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --color-danger:#DC2626; --color-warning:#F59E0B; --color-risk-low:#3B82F6; --success:#07C160; --color-bg-page:#F5F6F8; --divider:#F0F0F0; --text-primary:#191919; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--color-bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; box-shadow:0 0 50px rgba(0,0,0,0.5); border:8px solid #333; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; border-bottom:1px solid #F3F4F6; }
.content { flex:1; overflow-y:auto; padding-bottom:20px; }
.tab-bar { height:84px; background:#fff; border-top:1px solid #E5E7EB; display:flex; justify-content:space-around; align-items:center; padding-bottom:20px; flex-shrink:0; }
.tab-item { display:flex; flex-direction:column; align-items:center; text-align:center; color:#9CA3AF; text-decoration:none; }
.tab-item.active { color:var(--color-primary); }
.tab-item iconify-icon { font-size:24px; margin-bottom:4px; }
.tab-item span { font-size:11px; }
.card { background:#fff; border-radius:16px; margin:12px 16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,0.02); }
.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }

.range-tabs { display:flex; padding:14px 16px 4px; gap:8px; }
.range-tabs span { padding:6px 14px; background:#fff; border-radius:18px; font-size:12px; color:var(--text-secondary); cursor:pointer; border:1px solid var(--divider); }
.range-tabs span.on { background:var(--color-primary); color:#fff; border-color:var(--color-primary); font-weight:600; }

.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:0 16px 12px; }
.kpi { background:#fff; border-radius:12px; padding:14px 8px; text-align:center; }
.kpi .num { font-size:20px; font-weight:700; }
.kpi .label { font-size:10px; color:var(--text-secondary); margin-top:4px; }
.kpi.blue .num { color:var(--color-primary); }
.kpi.green .num { color:var(--success); }
.kpi.orange .num { color:var(--color-warning); }

.card .h { font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
.card .h .meta { font-size:11px; color:var(--text-secondary); font-weight:400; }
.card svg { display:block; width:100%; }

.ranking .row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--divider); }
.ranking .row:last-child { border-bottom:0; }
.ranking .rank { width:20px; font-size:11px; font-weight:700; color:var(--text-secondary); text-align:center; }
.ranking .rank.r1 { color:#DC2626; }
.ranking .rank.r2 { color:#F59E0B; }
.ranking .rank.r3 { color:var(--color-primary); }
.ranking .avatar { width:32px; height:32px; border-radius:50%; overflow:hidden; flex-shrink:0; }
.ranking .avatar img { width:100%; height:100%; object-fit:cover; }
.ranking .name { flex:1; font-size:12px; font-weight:600; color:var(--text-primary); }
.ranking .bar { flex:2; height:6px; background:#F3F4F6; border-radius:3px; overflow:hidden; margin:0 8px; }
.ranking .bar > span { display:block; height:100%; background:var(--color-primary); }
.ranking .score { font-size:12px; font-weight:700; color:var(--text-primary); min-width:32px; text-align:right; }

.heatmap-table { width:100%; border-collapse:collapse; font-size:9px; }
.heatmap-table th, .heatmap-table td { padding:4px 2px; text-align:center; }
.heatmap-table th { color:var(--text-secondary); font-weight:500; }
.heatmap-table th:first-child, .heatmap-table td:first-child { text-align:left; padding-left:0; color:var(--text-regular); font-size:10px; }
.heatmap-cell { width:18px; height:18px; border-radius:3px; margin:0 auto; }

.legend { display:flex; align-items:center; gap:8px; font-size:10px; color:var(--text-secondary); margin-top:8px; }
.legend .gradient { flex:1; height:8px; border-radius:2px; background:linear-gradient(90deg, #F3F4F6, #FCA5A5, #DC2626); }
</style>
</head>
<body>
<div class="phone-shell">
<div class="status-bar">
<span>12:20</span>
<div class="flex gap-1.5 text-[#000]">
<iconify-icon icon="mingcute:signal-fill"></iconify-icon>
<iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
<iconify-icon icon="mingcute:battery-fill"></iconify-icon>
</div>
</div>
<div class="nav-bar">
<h1 class="text-base font-bold text-gray-900 mx-auto">全院统计看板</h1>
</div>
<div class="content">
<div class="range-tabs">
<span class="on" data-range="week">近7天</span>
<span data-range="month">近30天</span>
<span data-range="semester">本学期</span>
</div>

<div class="kpi-grid">
<div class="kpi blue"><div class="num">42</div><div class="label">异常总数</div></div>
<div class="kpi green"><div class="num">92%</div><div class="label">结案率</div></div>
<div class="kpi orange"><div class="num">2.4h</div><div class="label">平均处理</div></div>
</div>

<div class="card">
<div class="h">异常趋势 <span class="meta">近 7 天</span></div>
<svg viewBox="0 0 320 160" preserveAspectRatio="none">
<defs>
<linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#1E5AE6" stop-opacity="0.3"/>
<stop offset="100%" stop-color="#1E5AE6" stop-opacity="0"/>
</linearGradient>
</defs>
<line x1="20" y1="140" x2="320" y2="140" stroke="#E5E7EB"/>
<line x1="20" y1="100" x2="320" y2="100" stroke="#F3F4F6" stroke-dasharray="3,3"/>
<line x1="20" y1="60" x2="320" y2="60" stroke="#F3F4F6" stroke-dasharray="3,3"/>
<path d="M 20,100 L 60,80 L 100,90 L 140,60 L 180,75 L 220,40 L 280,55 L 320,30 L 320,140 L 20,140 Z" fill="url(#trendGrad)"/>
<polyline points="20,100 60,80 100,90 140,60 180,75 220,40 280,55 320,30" fill="none" stroke="#1E5AE6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<g fill="#1E5AE6">
<circle cx="20" cy="100" r="3"/><circle cx="60" cy="80" r="3"/><circle cx="100" cy="90" r="3"/><circle cx="140" cy="60" r="3"/>
<circle cx="180" cy="75" r="3"/><circle cx="220" cy="40" r="3"/><circle cx="280" cy="55" r="3"/><circle cx="320" cy="30" r="3"/>
</g>
<g font-size="9" fill="#9CA3AF" text-anchor="middle">
<text x="20" y="155">6/24</text><text x="100" y="155">6/26</text><text x="180" y="155">6/28</text><text x="260" y="155">6/30</text><text x="320" y="155">今</text>
</g>
</svg>
</div>

<div class="card">
<div class="h">风险等级分布 <span class="meta">红/黄/蓝</span></div>
<svg viewBox="0 0 320 160">
<g transform="translate(80,80)">
<circle r="60" fill="none" stroke="#DC2626" stroke-width="20" stroke-dasharray="42 377" transform="rotate(-90)"/>
<circle r="60" fill="none" stroke="#F59E0B" stroke-width="20" stroke-dasharray="100 377" stroke-dashoffset="-42" transform="rotate(-90)"/>
<circle r="60" fill="none" stroke="#3B82F6" stroke-width="20" stroke-dasharray="210 377" stroke-dashoffset="-142" transform="rotate(-90)"/>
<text text-anchor="middle" y="-4" font-size="20" font-weight="700" fill="#191919">42</text>
<text text-anchor="middle" y="14" font-size="9" fill="#888">异常总数</text>
</g>
<g font-size="11" fill="#191919">
<rect x="190" y="40" width="10" height="10" rx="2" fill="#DC2626"/>
<text x="206" y="49">红档 5</text>
<rect x="190" y="62" width="10" height="10" rx="2" fill="#F59E0B"/>
<text x="206" y="71">黄档 12</text>
<rect x="190" y="84" width="10" height="10" rx="2" fill="#3B82F6"/>
<text x="206" y="93">蓝档 25</text>
</g>
</svg>
</div>

<div class="card">
<div class="h">异常热力图 <span class="meta">班级 × 周次(近 5 周)</span></div>
<table class="heatmap-table">
<thead><tr><th>班级</th><th>W4</th><th>W5</th><th>W6</th><th>W7</th><th>W8</th></tr></thead>
<tbody id="heatmapBody"></tbody>
</table>
<div class="legend">
<span>少</span>
<div class="gradient"></div>
<span>多</span>
</div>
</div>

<div class="card">
<div class="h">辅导员跟进效率榜 <span class="meta">结案率</span></div>
<div class="ranking">
<div class="row">
<span class="rank r1">1</span>
<div class="avatar"><img alt="" src="https://ui-avatars.com/api/?name=王&background=1E5AE6&color=fff&size=64&bold=true&font-size=0.5"/></div>
<span class="name">王辅导员</span>
<span class="bar"><span style="width:98%;"></span></span>
<span class="score">98.2</span>
</div>
<div class="row">
<span class="rank r2">2</span>
<div class="avatar"><img alt="" src="https://ui-avatars.com/api/?name=李&background=1E5AE6&color=fff&size=64&bold=true&font-size=0.5"/></div>
<span class="name">李辅导员</span>
<span class="bar"><span style="width:92%;"></span></span>
<span class="score">92.5</span>
</div>
<div class="row">
<span class="rank r3">3</span>
<div class="avatar"><img alt="" src="https://ui-avatars.com/api/?name=张&background=1E5AE6&color=fff&size=64&bold=true&font-size=0.5"/></div>
<span class="name">张辅导员</span>
<span class="bar"><span style="width:88%;"></span></span>
<span class="score">88.0</span>
</div>
</div>
</div>
</div>
<div class="tab-bar">
<a class="tab-item" href="secretary_workbench.html">
<iconify-icon icon="solar:widget-2-linear"></iconify-icon>
<span>工作台</span>
</a>
<a class="tab-item" href="secretary_counselors.html">
<iconify-icon icon="solar:users-group-rounded-linear"></iconify-icon>
<span>辅导员</span>
</a>
<a class="tab-item active" href="secretary_statistics.html">
<iconify-icon icon="solar:chart-square-bold"></iconify-icon>
<span>统计</span>
</a>
<a class="tab-item" href="secretary_anomalies.html">
<iconify-icon icon="solar:danger-linear"></iconify-icon>
<span>异常</span>
</a>
<a class="tab-item" href="secretary_profile.html">
<iconify-icon icon="solar:user-circle-linear"></iconify-icon>
<span>我的</span>
</a>
</div>
<div class="home-indicator"><div class="bar"></div></div>
</div>
<script>
const HEAT = [
  { cls:'2024级(1)班', w:[3,5,4,7,6] },
  { cls:'2024级(2)班', w:[2,1,3,2,4] },
  { cls:'2024级(3)班', w:[5,4,3,2,3] },
  { cls:'2024级(4)班', w:[1,2,2,3,2] }
];
const MAX = 8;
function heatColor(v) {
  const t = Math.min(v / MAX, 1);
  if (t === 0) return '#F3F4F6';
  if (t < 0.34) return '#FECACA';
  if (t < 0.67) return '#F87171';
  return '#DC2626';
}
document.getElementById('heatmapBody').innerHTML = HEAT.map(r =>
  '<tr><td>' + r.cls + '</td>' + r.w.map(v => '<td><div class="heatmap-cell" style="background:' + heatColor(v) + ';"></div></td>').join('') + '</tr>'
).join('');
document.querySelectorAll('.range-tabs span').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.range-tabs span').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
  });
});
</script>
</body>
</html>
