<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>创建辅导员账号 - 学工助手</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
:root { --color-primary:#1E5AE6; --bg-page:#F7F7F7; --divider:#F0F0F0; --text-primary:#191919; --text-regular:#444; --text-secondary:#888; }
body { background-color:#1a1a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
.phone-shell { width:375px; height:812px; background:var(--bg-page); border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column; box-shadow:0 0 50px rgba(0,0,0,0.5); border:8px solid #333; }
.status-bar { height:44px; padding:0 20px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#000; flex-shrink:0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height:44px; display:flex; align-items:center; padding:0 16px; background:#fff; flex-shrink:0; }
.content { flex:1; overflow-y:auto; padding-bottom:100px; }
.card { background:#fff; margin:12px 16px 0; border-radius:12px; padding:16px; }
.card .h { font-size:13px; font-weight:700; color:var(--text-primary); margin-bottom:12px; }
.card .h .meta { font-size:11px; color:var(--text-secondary); font-weight:400; margin-left:6px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; color:var(--text-regular); margin-bottom:6px; font-weight:600; }
.field label .req { color:#DC2626; }
.field input, .field select { width:100%; height:42px; padding:0 12px; border:1px solid var(--divider); border-radius:10px; font-size:13px; color:var(--text-primary); background:#fff; box-sizing:border-box; outline:none; }
.field input:focus, .field select:focus { border-color:var(--color-primary); }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.checkbox-list { display:flex; flex-wrap:wrap; gap:8px; }
.checkbox-list label { display:flex; align-items:center; gap:6px; padding:8px 12px; border:1px solid var(--divider); border-radius:10px; font-size:12px; color:var(--text-regular); cursor:pointer; background:#fff; }
.checkbox-list label.on { background:rgba(30,90,230,0.08); border-color:var(--color-primary); color:var(--color-primary); font-weight:600; }
.checkbox-list .swatch { width:6px; height:6px; border-radius:50%; }
.pwd-card { background:#F8FAFF; border:1px dashed rgba(30,90,230,0.4); border-radius:10px; padding:12px 14px; font-size:12px; color:var(--text-regular); line-height:1.7; }
.pwd-card .pwd { font-family:monospace; font-size:18px; font-weight:700; color:var(--color-primary); letter-spacing:2px; margin:6px 0; }
.btn-row { display:flex; gap:10px; padding:12px 16px 28px; background:#fff; border-top:1px solid var(--divider); position:absolute; left:0; right:0; bottom:0; }
.btn { flex:1; height:44px; border-radius:22px; font-size:14px; font-weight:600; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.btn.cancel { background:#F2F3F5; color:var(--text-regular); }
.btn.primary { background:var(--color-primary); color:#fff; box-shadow:0 4px 12px rgba(30,90,230,0.3); text-decoration:none; }
.home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
.home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
.tip { font-size:11px; color:var(--text-secondary); margin-top:4px; line-height:1.6; }
</style>
</head>
<body>
<div class="phone-shell">
<div class="status-bar">
<span>12:20</span>
<div class="flex gap-1.5">
<iconify-icon icon="mingcute:signal-fill"></iconify-icon>
<iconify-icon icon="mingcute:wifi-fill"></iconify-icon>
<iconify-icon icon="mingcute:battery-fill"></iconify-icon>
</div>
</div>
<div class="nav-bar">
<a class="p-2 -ml-2" href="secretary_counselors.html" aria-label="辅导员列表"><iconify-icon class="text-xl" icon="solar:alt-arrow-left-linear"></iconify-icon></a>
<h1 class="flex-1 text-center text-base font-bold text-gray-900">创建辅导员账号</h1>
</div>

<div class="content">
<form id="xzdForm" onsubmit="event.preventDefault();" novalidate autocomplete="on">
<div class="card">
<div class="h">基础信息</div>
<div class="field-row">
<div class="field"><label for="newName">姓名<span class="req">*</span></label><input id="newName" name="newName" placeholder="请输入真实姓名" type="text" value=""/></div>
<div class="field"><label for="newAccount">工号<span class="req">*</span></label><input id="newAccount" name="newAccount" placeholder="如 wangjy" type="text" value=""/></div>
</div>
<div class="field"><label for="newDept">所属学部<span class="req">*</span></label><select id="newDept" name="newDept"><option>智能技术学部</option><option>其他学部</option></select></div>
<div class="field"><label>角色类型</label><input type="text" value="辅导员" disabled style="background:#F9FAFB;color:var(--text-secondary);"/></div>
</div>

<div class="card">
<div class="h">所带班级<span class="meta">多选</span></div>
<div class="checkbox-list">
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>2024级(1)班</label>
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>2024级(2)班</label>
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>2024级(3)班</label>
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>2024级(4)班</label>
<label><span class="swatch" style="background:#E5E7EB;"></span>2023级(1)班</label>
<label><span class="swatch" style="background:#E5E7EB;"></span>2023级(2)班</label>
</div>
</div>

<div class="card">
<div class="h">模块权限<span class="meta">至少 1 项</span></div>
<div class="checkbox-list">
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>学生管理</label>
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>工作日志</label>
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>异常预警</label>
<label class="on"><span class="swatch" style="background:var(--color-primary);"></span>提醒推送</label>
<label for="newRemark"><span class="swatch" style="background:#E5E7EB;"></span>自定义模块</label>
<label for="newRemark"><span class="swatch" style="background:#E5E7EB;"></span>数据看板</label>
</div>
<p class="tip">未授权的模块不会在小程序首页与菜单中显示,避免无关功能干扰用户使用。</p>
</div>

<div class="card">
<div class="h">初始密码<span class="meta">系统自动生成</span></div>
<div class="pwd-card">
系统将自动生成 6 位初始密码,辅导员首次登录须强制修改。
<div class="pwd">Sit@2026</div>
<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);">
<span>下发方式:站内消息 + 邮件</span>
<a style="color:var(--color-primary);text-decoration:none;" href="#">重新生成</a>
</div>
</div>
</div>

<div class="card">
<div class="h">备注(可选)</div>
<div class="field"><label for="newRemark">内部备注</label><input id="newRemark" name="newRemark" placeholder="如:新入职教师,需重点关注" type="text"/></div>
</div>
</div>

<div class="btn-row">
<a class="btn cancel" href="secretary_counselors.html">取消</a>
<a class="btn primary" href="#" onclick="event.preventDefault(); alert('原型演示：实际将 POST /api/admin/counselors。表单字段待 PR-B 补全。');">确认创建</a>
</div></form>

<div class="home-indicator"><div class="bar"></div></div>
</div>
</body>
</html>
