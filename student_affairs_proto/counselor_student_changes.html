<script>
(function() {
  const DATA = JSON.parse(document.getElementById('page-data').textContent);
  const TYPE_INFO = {
    transfer_in:  { label: '转入', icon: 'solar:login-3-bold' },
    transfer_out: { label: '转出', icon: 'solar:logout-bold' },
    dropout:      { label: '退学', icon: 'solar:close-circle-bold' },
    leave:        { label: '休学', icon: 'solar:pause-circle-bold' },
    extended:     { label: '延毕', icon: 'solar:clock-circle-bold' },
    military:     { label: '参军', icon: 'solar:shield-keyhole-bold' }
  };
  const TYPE_LABELS_KEY = { transfer_in:1, transfer_out:1, dropout:1, leave:1, extended:1, military:1 };

  const storedRaw = localStorage.getItem('xzd-changes');
  if (storedRaw) {
    try {
      const stored = JSON.parse(storedRaw);
      if (Array.isArray(stored) && stored.length) {
        DATA.changes = stored.concat(DATA.changes);
      }
    } catch(e) {}
  }

  const list = document.getElementById('changeList');
  const empty = document.getElementById('emptyState');
  let activeType = 'all';
  let activeClass = 'all';
  let activeKeyword = '';

  /* PR-H.2: read URL params on entry */
  (function(){
    var p = new URLSearchParams(window.location.search);
    var t = p.get('type');
    if (t && TYPE_LABELS_KEY[t]) {
      activeType = t;
      document.querySelectorAll('#chipRow .chip').forEach(function(c){c.classList.remove('active');});
      var matchChip = document.querySelector('#chipRow .chip[data-type="'+t+'"]');
      if (matchChip) matchChip.classList.add('active');
    }
    var from = p.get('from');
    var back = document.getElementById('navBack');
    if (back) {
      if (from === 'students') back.setAttribute('href', 'counselor_students.html');
      else if (from === 'workbench') back.setAttribute('href', 'counselor_workbench.html');
      else back.setAttribute('href', 'counselor_workbench.html');
    }
    var navAction = document.getElementById('navAction');
    if (navAction && activeType !== 'all') {
      navAction.setAttribute('href', 'counselor_student_change_edit.html?type=' + encodeURIComponent(activeType));
    }
  })();

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function avatarUrl(name) {
    const ch = escapeHtml((name || '?').charAt(0));
    return `https://ui-avatars.com/api/?name=${ch}&background=1E5AE6&color=fff&size=128&bold=true&font-size=0.5`;
  }

  function render() {
    const kw = activeKeyword.trim().toLowerCase();
    const filtered = DATA.changes.filter(c => {
      if (activeType !== 'all' && c.type !== activeType) return false;
      if (activeClass !== 'all') {
        const inFrom = c.fromClass === activeClass;
        const inTo = c.toClass === activeClass;
        if (!inFrom && !inTo) return false;
      }
      if (kw) {
        const hay = (c.no + ' ' + c.name + ' ' + (c.fromClass||'') + ' ' + (c.toClass||'')).toLowerCase();
        if (!hay.includes(kw)) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = filtered.map(c => {
      const info = TYPE_INFO[c.type] || { label: c.type, icon: 'solar:question-circle-bold' };
      const toText = c.toDept + (c.toClass ? '·' + c.toClass : '');
      const fromText = c.fromDept + (c.fromMajor ? ' · ' + c.fromMajor : '') + (c.fromClass ? ' · ' + c.fromClass : '');
      return `
<div class="change-card" data-type="${c.type}" data-search="${escapeHtml((c.no+' '+c.name).toLowerCase())}">
<div class="change-head">
<div class="change-avatar"><img src="${avatarUrl(c.name)}" alt=""/></div>
<div class="change-meta">
<div class="change-name">${escapeHtml(c.name)}</div>
<div class="change-no">${escapeHtml(c.no)} · ${escapeHtml(c.fromClass || '')}</div>
</div>
<span class="type-tag ${c.type}">
<iconify-icon icon="${info.icon}"></iconify-icon>
${escapeHtml(info.label)}
</span>
</div>
<div class="change-path">
<div class="path-row"><span class="path-label">原专业</span><span class="path-value">${escapeHtml(fromText)}</span></div>
<div class="path-row"><span class="path-label">${c.type === 'transfer_in' ? '调入' : c.type === 'transfer_out' ? '转至' : c.type === 'extended' ? '延毕至' : '异动至'}</span><span class="path-value">${escapeHtml(toText)}</span></div>
</div>
<div class="change-foot">
<span class="change-reason">备注：${escapeHtml(c.reason || '—')}</span>
<span>${escapeHtml(c.date)} · ${escapeHtml(c.operator)}</span>
</div>
</div>`;
    }).join('');
  }

  function updateCounts() {
    const all = DATA.changes.length;
    const byType = { transfer_in:0, transfer_out:0, dropout:0, leave:0, extended:0, military:0 };
    DATA.changes.forEach(c => { if (byType[c.type] != null) byType[c.type]++; });
    document.getElementById('cntAll').textContent = all;
    document.getElementById('cntIn').textContent = byType.transfer_in;
    document.getElementById('cntOut').textContent = byType.transfer_out;
    document.getElementById('cntDrop').textContent = byType.dropout;
    document.getElementById('cntLeave').textContent = byType.leave;
    document.getElementById('cntExt').textContent = byType.extended;
    document.getElementById('cntMil').textContent = byType.military;
    document.getElementById('statTotal').textContent = all;
    document.getElementById('statIn').textContent = byType.transfer_in;
    document.getElementById('statOut').textContent = byType.transfer_out;
    const now = new Date();
    const monthCount = DATA.changes.filter(c => {
      const d = new Date(c.date);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }).length;
    document.getElementById('statMonth').textContent = monthCount;
  }

  document.getElementById('classChipRow').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#classChipRow .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeClass = chip.dataset.class;
    render();
  });

  document.getElementById('chipRow').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#chipRow .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeType = chip.dataset.type;
    render();
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    activeKeyword = e.target.value;
    render();
  });

  updateCounts();
  render();
})();
</script>
<script>
/* PR-H.4: nav-back 用 history.back() 替代 referrer (兼容 file:// + http:// + https://) */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      if (history.length > 1) {
        a.setAttribute('href', 'javascript:history.back()');
        return;
      }
      if (parts.length) {
        a.setAttribute('href', base + '?' + parts.join('&'));
      }
    });
  } catch(e) { console.error('PR-H.4 nav-back error:', e); }
})();
</script></body>
</html>
