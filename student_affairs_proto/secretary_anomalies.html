        .tab-bar { height: 84px; background: #fff; border-top: 1px solid #E5E7EB; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; flex-shrink: 0; }

        /* 横向滚动桌面端鼠标增强 */
        .xzd-hscroll { position: relative; }
        .xzd-hscroll .hscroll-area {
            scroll-behavior: smooth;

            cursor: grab;
        }
        .xzd-hscroll .hscroll-area.dragging { cursor: grabbing; scroll-behavior: auto; }
        .xzd-hscroll .nav-btn {

            width: 24px; height: 24px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #E5E7EB; border-radius: 50%;

            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            opacity: 0; transition: opacity 0.2s;
            color: #6B7280;
            font-size: 14px;
        }
        .xzd-hscroll:hover .nav-btn,
        .xzd-hscroll .nav-btn:focus { opacity: 1; }
        .xzd-hscroll .nav-btn.left { left: 4px; }
        .xzd-hscroll .nav-btn.right { right: 4px; }
        .xzd-hscroll .nav-btn.hidden { opacity: 0 !important; pointer-events: none; }
        .home-indicator { height:34px; background:#fff; display:flex; justify-content:center; align-items:flex-end; padding-bottom:8px; flex-shrink:0; }
        .home-indicator .bar { width:134px; height:5px; border-radius:3px; background:#000; opacity:0.85; }
    </style>
</head>

<script>
function initHScroll(wrapper) {
    if (!wrapper) return;
    var scroll = wrapper.querySelector('.hscroll-area');
    var leftBtn = wrapper.querySelector('.nav-btn.left');
    var rightBtn = wrapper.querySelector('.nav-btn.right');
    if (!scroll || !leftBtn || !rightBtn) return;

    function updateBtns() {
        leftBtn.classList.toggle('hidden', scroll.scrollLeft <= 1);
        rightBtn.classList.toggle('hidden',
            scroll.scrollLeft >= scroll.scrollWidth - scroll.clientWidth - 1);
    }
    leftBtn.addEventListener('click', function() {
        scroll.scrollBy({ left: -120, behavior: 'smooth' });
    });
    rightBtn.addEventListener('click', function() {
        scroll.scrollBy({ left: 120, behavior: 'smooth' });
    });
    scroll.addEventListener('scroll', updateBtns, { passive: true });
    updateBtns();

    scroll.addEventListener('wheel', function(e) {
        if (e.deltaY === 0) return;
        e.preventDefault();
        scroll.scrollLeft += e.deltaY;
    }, { passive: false });

    var isDown = false, startX = 0, startScroll = 0;
    scroll.addEventListener('mousedown', function(e) {
        isDown = true; startX = e.pageX; startScroll = scroll.scrollLeft;
        scroll.classList.add('dragging');
    });
    ['mouseleave', 'mouseup'].forEach(function(evt) {
        scroll.addEventListener(evt, function() {
            isDown = false; scroll.classList.remove('dragging');
        });
    });
    scroll.addEventListener('mousemove', function(e) {
        if (!isDown) return;
        e.preventDefault();
        scroll.scrollLeft = startScroll - (e.pageX - startX) * 1.5;
    });

    scroll.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); scroll.scrollBy({ left: -120, behavior: 'smooth' }); }
        if (e.key === 'ArrowRight') { e.preventDefault(); scroll.scrollBy({ left:  120, behavior: 'smooth' }); }
    });
}

initHScroll(document.getElementById('anomFilterCarousel'));
</script>
