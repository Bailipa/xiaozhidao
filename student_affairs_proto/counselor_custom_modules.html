<!DOCTYPE html>
<!--
  API Contract:
  GET /api/me/custom-modules
  Response 200: {
    "modules": [
      { "module_id":"string", "name":"string", "purpose":"string",
        "record_count":int, "visibility":"private|shared",
        "created_at":"ISO-8601", "updated_at":"ISO-8601" }
    ]
  }
  POST /api/me/custom-modules
  Request: { "name":"string", "purpose":"string", "visibility":"private|shared" }
  Response 201: { ... }
  DELETE /api/me/custom-modules/{id}
  Response 200: { "message":"string" }
  PUT /api/me/custom-modules/{id}/visibility
  Request: { "visibility":"private|shared" }
  Response 200: { "module_id":"string", "visibility":"string", "updated_at":"ISO-8601" }
-->

    --mod-icon-3: linear-gradient(135deg, #F472B6, #EC4899);
    --mod-icon-4: linear-gradient(135deg, #FBBF24, #F59E0B);
}
body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
.phone-shell { width: 375px; height: 812px; background: var(--bg-page); border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
.status-bar { height: 44px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #000; flex-shrink: 0; line-height: 1; }
.status-bar iconify-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 16px;
}
.nav-bar { height: 44px; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; }
.content { flex: 1; overflow-y: auto; }
.tab-bar { height: 84px; background: #fff; border-top: 1px solid #E5E7EB; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; position: relative; flex-shrink: 0; }
.tab-item { display: flex; flex-direction: column; align-items: center; text-align: center; color: #9CA3AF; text-decoration: none; }
.tab-item.active { color: var(--color-primary); }
.tab-item iconify-icon { font-size: 24px; margin-bottom: 4px; }
.tab-item span { font-size: 11px; }
.plus-tab { width: 52px; height: 52px; background: var(--color-primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #fff; position: absolute; top: -16px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 12px rgba(30, 90, 230, 0.4); border: 2px solid #fff; }
.intro { margin: 16px; padding: 14px; background: linear-gradient(135deg, #EEF2FF 0%, #F5F3FF 100%); border-radius: 12px; }
.intro .h { font-size: 13px; font-weight: 600; color: #4338CA; display: flex; align-items: center; gap: 6px; }
.intro .p { font-size: 12px; color: #6B7280; margin-top: 6px; line-height: 1.6; }
.module-card { background: #fff; margin: 8px 16px; padding: 14px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
.module-card .head { display: flex; align-items: flex-start; gap: 12px; }
.module-card .icon { width: 40px; height: 40px; border-radius: 10px; background: var(--mod-icon-1); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.module-card .icon.b2 { background: var(--mod-icon-2); }

.module-card .visibility .v.private { background: #F5F5F5; color: #888; }
.module-card .visibility .v.shared { background: #ECFDF5; color: #07C160; }
.module-card .actions { display: flex; gap: 8px; }
.module-card .actions a { font-size: 11px; padding: 4px 10px; border-radius: 12px; display: inline-flex; align-items: center; gap: 4px; }
.module-card .actions .enter { background: var(--color-primary); color: #fff; }
.module-card .actions .toggle-btn { background: #F5F5F5; color: #444; }
.module-card .actions .toggle-btn iconify-icon { font-size: 14px; }
.module-card .actions .toggle-btn:hover { background: #E5E7EB; }
.section-h { padding: 14px 20px 4px; font-size: 12px; color: var(--text-secondary); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.add-btn { background: var(--color-primary); color: #fff; font-size: 11px; padding: 4px 10px; border-radius: 12px; display: flex; align-items: center; gap: 4px; }
.empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 13px; }
.empty .icon { font-size: 48px; color: #C0C4CC; margin-bottom: 12px; }
.home-indicator { height: 34px; background: #fff; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 8px; flex-shrink: 0; }
.home-indicator .bar { width: 134px; height: 5px; border-radius: 3px; background: #000; opacity: 0.85; }

/* 新建模块弹层 */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; display: none; align-items: flex-end; }
.modal-mask.show { display: flex; }
.modal-sheet { width: 100%; background: #fff; border-radius: 16px 16px 0 0; padding: 16px 20px 24px; animation: slideUp .25s; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 16px; font-weight: 600; padding: 6px 0 14px; border-bottom: 1px solid var(--divider); }
.field { margin-top: 14px; }
.field label { font-size: 12px; color: var(--text-secondary); }
.field input, .field textarea, .field select { width: 100%; padding: 10px 12px; background: #F5F5F5; border: 0; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; margin-top: 4px; font-family: inherit; }
.field textarea { min-height: 60px; resize: none; }
.field .opt { display: flex; gap: 8px; margin-top: 6px; }
.field .opt span { flex: 1; padding: 8px 0; text-align: center; border: 1.5px solid #E5E7EB; border-radius: 8px; font-size: 13px; }
.field .opt span.on { border-color: var(--color-primary); color: var(--color-primary); background: #EFF6FF; font-weight: 600; }
.modal-foot { display: flex; gap: 10px; margin-top: 20px; }
.modal-foot button { flex: 1; height: 44px; border-radius: 22px; font-size: 15px; font-weight: 600; border: 0; cursor: pointer; }
.modal-foot .cancel { background: #F2F3F5; color: #444; }
.modal-foot .confirm { background: var(--color-primary); color: #fff; }
</style>
</head>
<body>
<div class="phone-shell">

<!-- 模块卡片 template (JS 渲染用) -->
<template id="moduleCardTpl">
  <div class="module-card" data-mid="" data-visibility="">
    <div class="head">
      <div class="icon"><iconify-icon icon=""></iconify-icon></div>
      <div class="info">
        <div class="name"></div>
        <div class="purpose"></div>
        <div class="meta">
          <span><span class="v record-count">0</span> 条记录</span>
          <span class="updated-at"></span>
        </div>
      </div>
    </div>
    <div class="footer">
      <div class="visibility"><span class="v"></span></div>
      <div class="actions">
        <a class="enter" href="">进入</a>
        <a class="toggle-btn" href="#" onclick="toggleVisibility(event); return false;" aria-label="切换可见性">
          <iconify-icon icon="solar:lock-keyhole-bold"></iconify-icon>
        </a>

<!-- 新建模块弹层 -->
<div class="modal-mask" id="newModuleModal">
  <div class="modal-sheet">
    <div class="modal-title">新建自定义模块</div>
    <div class="field">
      <label for="newModuleName">模块名称</label>
      <input id="newModuleName" maxlength="20" placeholder="如:我今天的工作心得" type="text"/>
    </div>
    <div class="field">
      <label for="newModulePurpose">模块用途(可选)</label>
      <textarea id="newModulePurpose" maxlength="100" placeholder="简单描述这个模块的用途,便于后续管理"></textarea>
    </div>
    <div class="field">
      <label>可见性</label>
      <div class="opt">
        <span class="on" data-vis="private" onclick="setNewModuleVis('private')">仅自己</span>
        <span data-vis="shared" onclick="setNewModuleVis('shared')">授权书记查看</span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="cancel" onclick="closeNewModuleModal()">取消</button>
      <button class="confirm" onclick="confirmNewModule()">创建</button>
    </div>
  </div>
</div>

<script>
// 渲染模块卡片列表
function renderModules() {
  var data;
  try {
    data = JSON.parse(document.getElementById('page-data').textContent);
  } catch (e) { return; }
  var list = document.getElementById('moduleList');
  var tpl = document.getElementById('moduleCardTpl');
  document.getElementById('moduleCount').textContent = data.modules.length;
  list.innerHTML = '';

  data.modules.forEach(function(m) {
    var card = tpl.content.cloneNode(true);
    var root = card.querySelector('.module-card');
    root.dataset.mid = m.module_id;
    root.dataset.visibility = m.visibility;

    var iconDiv = card.querySelector('.icon');
    if (m.icon_bg) iconDiv.classList.add(m.icon_bg);
    card.querySelector('.icon iconify-icon').setAttribute('icon', m.icon || 'solar:diploma-bold');

    card.querySelector('.name').textContent = m.name;
    card.querySelector('.purpose').textContent = m.purpose;
    card.querySelector('.record-count').textContent = m.record_count;

    // ISO 时间 → MM-DD HH:mm
    var dt = new Date(m.updated_at);
    var pad = function(n) { return String(n).padStart(2, '0'); };
    card.querySelector('.updated-at').textContent =
      '更新于 ' + pad(dt.getMonth() + 1) + '-' + pad(dt.getDate()) +
      ' ' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());

    var visEl = card.querySelector('.visibility .v');
    var togBtn = card.querySelector('.toggle-btn');
    var togIcon = togBtn.querySelector('iconify-icon');
    if (m.visibility === 'shared') {
      visEl.className = 'v shared';
      visEl.textContent = '已授权书记查看';
      togIcon.setAttribute('icon', 'solar:lock-keyhole-unlock-bold');
      togBtn.style.background = '#ECFDF5';
      togBtn.style.color = '#07C160';
    } else {
      visEl.className = 'v private';
      visEl.textContent = '仅自己';
      togIcon.setAttribute('icon', 'solar:lock-keyhole-bold');
      togBtn.style.background = '#F5F5F5';
      togBtn.style.color = '#444';
    }

    card.querySelector('.enter').href =
      'counselor_custom_module_records.html?mid=' + m.module_id;

    list.appendChild(card);
  });
}

// 切换可见性
function toggleVisibility(event) {
  event.preventDefault();
  var card = event.currentTarget.closest('.module-card');
  var mid = card.dataset.mid;
  var current = card.dataset.visibility;
  var next = current === 'shared' ? 'private' : 'shared';
  var nextLabel = next === 'shared' ? '已授权书记查看' : '仅自己';
  var name = card.querySelector('.name').textContent;

  if (!confirm('将「' + name + '」改为「' + nextLabel + '」？\n\n(原型演示,实际将 PUT /api/me/custom-modules/' + mid + '/visibility)')) return;

  card.dataset.visibility = next;
  var visEl = card.querySelector('.visibility .v');
  visEl.className = 'v ' + next;
  visEl.textContent = nextLabel;
  var togBtn = card.querySelector('.toggle-btn');
  var togIcon = togBtn.querySelector('iconify-icon');
  if (next === 'shared') {
    togIcon.setAttribute('icon', 'solar:lock-keyhole-unlock-bold');
    togBtn.style.background = '#ECFDF5';
    togBtn.style.color = '#07C160';
  } else {
    togIcon.setAttribute('icon', 'solar:lock-keyhole-bold');
    togBtn.style.background = '#F5F5F5';
    togBtn.style.color = '#444';
  }
  alert('已更新可见性(演示)');
}

// 新建模块弹层
function openNewModuleModal() {
  document.getElementById('newModuleName').value = '';
  document.getElementById('newModulePurpose').value = '';
  setNewModuleVis('private');
  document.getElementById('newModuleModal').classList.add('show');
}
function closeNewModuleModal() {
  document.getElementById('newModuleModal').classList.remove('show');
}
function setNewModuleVis(v) {
  document.querySelectorAll('#newModuleModal .opt span').forEach(function(el) {
    el.classList.toggle('on', el.dataset.vis === v);
  });
}
function confirmNewModule() {
  var name = document.getElementById('newModuleName').value.trim();
  if (!name) { alert('请填写模块名称'); return; }
  closeNewModuleModal();
  alert('已创建模块"' + name + '"(演示,实际数据未持久化)');
}
document.getElementById('newModuleModal').addEventListener('click', function(e) {
  if (e.target.id === 'newModuleModal') closeNewModuleModal();
});

// 初始化
renderModules();
</script>
<script>
/* PR-H.3 v3: nav-back 智能返回 — 优先 referrer, 其次当前 URL */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    /* referrer: 如果 referrer 是同源 counselor_*.html, 用它作为回退目标 */
    var refBase = null, refParts = [];
    if (document.referrer) {
      try {
        var refUrl = new URL(document.referrer);
        var refName = refUrl.pathname.substring(refUrl.pathname.lastIndexOf('/') + 1);
        if (refName.indexOf('counselor_') === 0 && refName.indexOf('.html') !== -1) {
          refBase = refName;
          var refSp = new URLSearchParams(refUrl.search);
          K.forEach(function(k){var v=refSp.get(k); if(v!=null && v!=='') refParts.push(k+'='+encodeURIComponent(v));});
        }
      } catch(e) {}
    }
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back, .nav-bar a[href^="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      var useParts = parts.length ? parts : refParts;
      if (!useParts.length) return;
      /* 如果 referrer 可用, 用 referrer 作为基础; 否则保留原 base */
      var finalBase = refBase || base;
      a.setAttribute('href', finalBase + '?' + useParts.join('&'));
    });
  } catch(e) { console.error('PR-H.3 v3 nav-back error:', e); }
})();
</script>
<script>
/* PR-H.3 FAB: plus-tab/fab → log_edit 时携带 from= */
(function(){
  try {
    var pth = location.pathname;
    var from = pth.substring(pth.lastIndexOf('/') + 1).replace(/\.html$/, '');
    document.querySelectorAll('a.plus-tab[href*="counselor_log_edit.html"], a.fab[href*="counselor_log_edit.html"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (!ex.has('from')) ex.set('from', from);
      a.setAttribute('href', base + '?' + ex.toString());
    });
  } catch(e) { console.error('PR-H.3 FAB error:', e); }
})();
</script>
