<script>
function confirmLogout() {
  var m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:flex;align-items:center;justify-content:center;padding:0 32px;';
  m.innerHTML = '<div style="background:#fff;border-radius:14px;width:100%;overflow:hidden;">'
    + '<div style="padding:24px 20px;text-align:center;">'
    + '<iconify-icon style="font-size:32px;color:#DC2626;" icon="solar:logout-bold-duotone"></iconify-icon>'
    + '<div style="font-size:16px;font-weight:700;color:#191919;margin-top:10px;">确认退出登录?</div>'
    + '<div style="font-size:12px;color:#888;margin-top:6px;line-height:1.6;">退出后需重新输入账号密码登录,本次操作将记入审计日志。</div>'
    + '</div>'
    + '<div style="display:flex;border-top:1px solid #F0F0F0;">'
    + '<button data-cancel style="flex:1;height:48px;background:#fff;color:#888;font-size:15px;border:none;border-right:1px solid #F0F0F0;cursor:pointer;">取消</button>'
    + '<button data-ok style="flex:1;height:48px;background:#fff;color:#DC2626;font-size:15px;font-weight:600;border:none;cursor:pointer;">确认退出</button>'
    + '</div></div>';
  document.body.appendChild(m);
  m.querySelector('[data-cancel]').onclick = function() { m.remove(); };
  m.querySelector('[data-ok]').onclick = function() {
    m.remove();
    window.location.href = 'login.html';
  };
}
</script>
<script>
/* PR-H.4: nav-back 用 history.back() 替代 referrer (兼容 file:// + http:// + https://) */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    document.querySelectorAll('.nav-bar a.p-2.-ml-2, a.nav-back').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('plus-tab') || a.classList.contains('fab')) return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      if (history.length > 1) {
        a.setAttribute('href', 'javascript:history.back()');
        return;
      }
      if (parts.length) {
        a.setAttribute('href', base + '?' + parts.join('&'));
      }
    });
  } catch(e) { console.error('PR-H.4 nav-back error:', e); }
})();
</script><script>
/* PR-H.3 FAB: plus-tab/fab → log_edit 时携带 from= */
(function(){
  try {
    var pth = location.pathname;
    var from = pth.substring(pth.lastIndexOf('/') + 1).replace(/\.html$/, '');
    document.querySelectorAll('a.plus-tab[href*="counselor_log_edit.html"], a.fab[href*="counselor_log_edit.html"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      var base = h.split('?')[0];
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (!ex.has('from')) ex.set('from', from);
      a.setAttribute('href', base + '?' + ex.toString());
    });
  } catch(e) { console.error('PR-H.3 FAB error:', e); }
})();
</script>
<script>
/* PR-H.3 v3+: forward 链 (子页链接携带父级参数) */
(function(){
  try {
    var sp = new URLSearchParams(location.search);
    var K = ['class','risk','dorm','from','filter','tier','type','anomaly','student','cat','lid','focus','mid','rid','q'];
    var parts = [];
    K.forEach(function(k){var v=sp.get(k); if(v!=null && v!=='') parts.push(k+'='+encodeURIComponent(v));});
    if (!parts.length) return;
    var joinTo = function(baseHref){
      var qIdx = baseHref.indexOf('?');
      return qIdx === -1 ? baseHref + '?' + parts.join('&') : baseHref + '&' + parts.join('&');
    };
    document.querySelectorAll('a[href*="counselor_"]').forEach(function(a){
      var h = a.getAttribute('href') || '';
      if (!h || h.indexOf('javascript:') === 0 || h[0] === '#') return;
      if (a.classList.contains('nav-back') || a.classList.contains('p-2')) return;
      var m = h.match(/^(counselor_[^?#]+)/);
      if (!m) return;
      var ex = new URLSearchParams(h.split('?')[1] || '');
      if (K.some(function(k){return ex.has(k);})) return;
      a.setAttribute('href', joinTo(h));
    });
  } catch(e) { console.error('PR-H.3 forward error:', e); }
})();
</script>
